<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排班設定</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    html, body { height: 100%; width: 100%; }
    .tab-active { background: #e2e8f0; color: #1e3a5f; }
    .tab-inactive { background: transparent; color: #ffffff; }
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 9999px; font-size: 12px; }
    .calendar-cell { min-width: 50px; min-height: 40px; border: 1px solid #e2e8f0; text-align: center; font-size: 12px; padding: 4px; }
    .calendar-cell.holiday { background: #fef2f2; color: #dc2626; }
    .calendar-cell.assigned { background: #dbeafe; color: #1e40af; font-weight: 500; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .tag-item { display: inline-flex; align-items: center; gap: 6px; background: #e0f2fe; color: #0369a1; padding: 4px 10px; border-radius: 4px; font-size: 13px; margin: 3px; }
    input[type="date"], input[type="time"], input[type="text"], select { border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 10px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full bg-slate-50 w-full">
  <div id="app" class="h-full w-full flex flex-col overflow-auto">
   <header class="bg-[#1e3a5f] text-white px-6 py-4 flex items-center justify-between shrink-0">
    <h1 id="appTitle" class="text-xl font-bold tracking-wide">班表設定</h1>
    <div class="flex gap-2">
     <button onclick="showNewScheduleModal()" class="px-4 py-1.5 rounded-md text-sm font-medium transition bg-blue-600 hover:bg-blue-700 flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i>複製班表</button>
    <div class="flex gap-2">
     <a href="index.html" class="px-4 py-1.5 rounded-md text-sm font-medium transition tab-inactive">班表總覽</a>
     <a href="shift-list.html" class="px-4 py-1.5 rounded-md text-sm font-medium transition tab-active">返回</a>
    </div>
   </header>
   <div id="pageSettings" class="flex-1 overflow-auto p-6">
    <div class="max-w-4xl mx-auto space-y-6">
     <section class="bg-white rounded-xl shadow-sm p-5 space-y-4">
      <h2 class="font-bold text-lg text-slate-800 flex items-center gap-2"><i data-lucide="clipboard-list" class="w-5 h-5 text-blue-600"></i>基本資訊</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
       <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">班表名稱 <span class="text-red-500">*</span></label> <input type="text" id="scheduleName" value="2026年1月排班" class="w-full">
       </div>
       <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">起始日期 <span class="text-red-500">*</span></label> <input type="date" id="startDate" value="2026-01-01" class="w-full">
       </div>
       <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">結束日期 <span class="text-red-500">*</span></label> <input type="date" id="endDate" value="2026-01-31" class="w-full">
       </div>
       <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">分公司/分店/案場 <span class="text-red-500">*</span></label>
        <select id="branchSelect" class="w-full"></select>
       </div>
       <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">部門/工作地</label>
        <select id="departmentSelect" class="w-full"></select>
       </div>
      </div>
     </section>
     <section class="bg-white rounded-xl shadow-sm p-5 space-y-4">
      <h2 class="font-bold text-lg text-slate-800 flex items-center gap-2"><i data-lucide="clock" class="w-5 h-5 text-amber-600"></i>班別排班</h2>
      <div id="shiftList" class="space-y-2"></div><button onclick="showAddShift()" class="px-4 py-2 bg-amber-50 text-amber-700 rounded-md text-sm font-medium hover:bg-amber-100 transition flex items-center gap-1"><i data-lucide="plus" class="w-4 h-4"></i>新增班別</button>
     </section>
     <section class="bg-white rounded-xl shadow-sm p-5 space-y-4">
      <h2 class="font-bold text-lg text-slate-800 flex items-center gap-2"><i data-lucide="calendar-off" class="w-5 h-5 text-red-500"></i>節假日設定</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
       <div>
        <label class="block text-sm font-medium text-slate-600 mb-2">假別組管理</label>
        <div id="holidayGroupList" class="space-y-2"></div><button onclick="showAddHolidayGroup()" class="mt-3 px-3 py-1.5 bg-red-50 text-red-600 rounded-md text-sm font-medium hover:bg-red-100 transition flex items-center gap-1"><i data-lucide="plus" class="w-4 h-4"></i>新增假別組</button>

  </div>
  <div id="shiftModal" class="modal-overlay hidden">
   <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm space-y-4">
    <h3 id="shiftModalTitle" class="font-bold text-lg">新增班別</h3>
    <div><label class="block text-sm font-medium text-slate-600 mb-1">班別名稱</label><input type="text" id="shiftName" placeholder="如：早班" class="w-full">
    </div>
    <div><label class="block text-sm font-medium text-slate-600 mb-1">班別簡稱</label><input type="text" id="shiftShortName" placeholder="如：早" class="w-full" maxlength="4">
    </div>
    <div class="grid grid-cols-2 gap-3">
     <div><label class="block text-sm font-medium text-slate-600 mb-1">起始</label><input type="time" id="shiftStart" value="08:00" class="w-full" oninput="onShiftTimeChange()">
     </div>
     <div><label class="block text-sm font-medium text-slate-600 mb-1">結束</label><input type="time" id="shiftEnd" value="12:00" class="w-full" oninput="onShiftTimeChange()">
     </div>
    </div>
    <div><label class="block text-sm font-medium text-slate-600 mb-1">休息時數（小時）</label><input type="number" id="shiftRest" min="0" step="0.5" placeholder="0" class="w-full" oninput="updateShiftHoursPreview()">
     <p class="text-xs text-slate-500 mt-1">勞基法：每繼續工作 4 小時至少休息 30 分鐘（僅工作 4 小時可免）。預設依時段自動帶入，可手動調高。</p>
     <p class="text-xs text-slate-500 mt-1">總工時 = 結束 - 起始 - 休息；預览：<span id="shiftHoursPreview" class="font-medium text-amber-700">0h</span>、最低法定休息：<span id="shiftMinRest" class="font-medium text-orange-700">0h</span></p>
    </div>
    <div class="border-t border-slate-200 pt-4 mt-4">
     <label class="block text-sm font-medium text-slate-600 mb-3 flex items-center gap-2"><i data-lucide="timer" class="w-4 h-4 text-orange-600"></i>可加班時段（此班別專用）</label>

      <div><label class="block text-sm font-medium text-slate-600 mb-1">起始時間</label><input type="time" id="shiftOtStart" class="w-full">
      </div>
      <div><label class="block text-sm font-medium text-slate-600 mb-1">結束時間</label><input type="time" id="shiftOtEnd" class="w-full">
      </div>
     </div>
    </div>
    <div class="flex justify-end gap-2 pt-2">
     <button onclick="closeShiftModal()" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-md">取消</button> <button id="shiftModalConfirmBtn" onclick="confirmAddShift()" class="px-4 py-2 text-sm bg-[#1e3a5f] text-white rounded-md hover:bg-[#2a4f7f]">確認</button>
    </div>
   </div>
  </div>
  <div id="newScheduleModal" class="modal-overlay hidden">
   <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md space-y-4">
    <h3 class="font-bold text-lg">複製班表</h3>
    <div><label class="block text-sm font-medium text-slate-600 mb-1">班表名稱</label><input type="text" id="newScheduleName" placeholder="如：2026年2月排班" class="w-full">
    </div>
    <div><label class="block text-sm font-medium text-slate-600 mb-1">分公司/分店/案場 <span class="text-red-500">*</span></label><select id="newScheduleBranch" class="w-full"></select>
    </div>

    </div>
    <div><label class="block text-sm font-medium text-slate-600 mb-1">結束日期</label><input type="date" id="newScheduleEnd" class="w-full">
    </div>
    <div class="flex justify-end gap-2 pt-2">
     <button onclick="closeNewScheduleModal()" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-md">取消</button> <button onclick="confirmNewSchedule()" class="px-4 py-2 text-sm bg-[#1e3a5f] text-white rounded-md hover:bg-[#2a4f7f]">確認</button>
    </div>
   </div>
  </div>
  <div id="attendanceGroupModal" class="modal-overlay hidden">
   <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md space-y-4">
    <h3 class="font-bold text-lg">新增考勤組</h3>
    <div><label class="block text-sm font-medium text-slate-600 mb-1">考勤組名稱</label><input type="text" id="groupName" placeholder="如：A組 - 倉儲" class="w-full">

    </div>
    <div>

     <div id="punchLocationOptions" class="flex flex-wrap gap-x-4 gap-y-1 border border-slate-200 rounded-md px-3 py-2 bg-slate-50"></div>
     <p class="text-xs text-slate-500 mt-1">可複選適用於本考勤組的打卡地點。</p>
    </div>
    <div><label class="block text-sm font-medium text-slate-600 mb-2">搜尋人員</label>

      <input type="text" id="searchPersonInput" placeholder="員工編號或身份證" class="flex-1"> <button onclick="searchPersonForGroup()" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-md text-sm font-medium hover:bg-blue-100 transition">搜尋</button>
     </div>
     <div id="searchResultsList" class="border border-slate-200 rounded-md max-h-40 overflow-y-auto bg-slate-50"></div>

      <button type="button" onclick="syncAssigneeList()" class="px-2.5 py-1 text-xs font-medium text-red-600 border border-red-300 rounded-md hover:bg-red-50 transition flex items-center gap-1">

    </div>
    <div class="flex justify-end gap-2 pt-2">
     <button onclick="closeAttendanceGroupModal()" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-md">取消</button> <button onclick="confirmAddAttendanceGroup()" class="px-4 py-2 text-sm bg-[#1e3a5f] text-white rounded-md hover:bg-[#2a4f7f]">確認</button>
    </div>
   </div>
  </div>
  <div id="holidayGroupModal" class="modal-overlay hidden">
   <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md space-y-4">
    <h3 class="font-bold text-lg" id="holidayModalTitle">新增假別組</h3>
    <div><label class="block text-sm font-medium text-slate-600 mb-1">假別組名稱</label><input type="text" id="holidayGroupName" placeholder="如：台灣國定假日" class="w-full">
    </div>
    <div><label class="block text-sm font-medium text-slate-600 mb-2">假日日期</label>
     <div class="flex gap-2 mb-2">
      <input type="date" id="addHolidayDateInModal" class="flex-1"> <button onclick="addHolidayDateToGroup()" class="px-3 py-1.5 bg-red-50 text-red-600 rounded-md text-sm font-medium hover:bg-red-100 transition">新增</button>
     </div>
     <div id="holidayDateListInModal" class="flex flex-wrap gap-1"></div>
    </div>
    <div class="flex justify-end gap-2 pt-2">
     <button onclick="closeHolidayGroupModal()" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-md">取消</button> <button onclick="confirmAddHolidayGroup()" class="px-4 py-2 text-sm bg-[#1e3a5f] text-white rounded-md hover:bg-[#2a4f7f]">確認</button>
    </div>
   </div>
  </div>
  <script>
  function _genWeekendsOfYear(year) {
    const out = [];
    const d = new Date(year, 0, 1);
    while (d.getFullYear() === year) {
      const w = d.getDay();
      if (w === 0 || w === 6) {
        out.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
      }
      d.setDate(d.getDate() + 1);
    }
    return out;
  }
  let holidayGroups = {
    '台灣國定假日': [
      // 元旦
      '2026-01-01', '2026-01-02',
      // 春節 (2/14–2/22)
      '2026-02-14', '2026-02-15', '2026-02-16', '2026-02-17', '2026-02-18', '2026-02-19', '2026-02-20', '2026-02-21', '2026-02-22',
      // 和平紀念日 (2/27補假、2/28、3/1)
      '2026-02-27', '2026-02-28', '2026-03-01',
      // 兒童節／清明節 (4/3補假、4/4、4/5、4/6補假)
      '2026-04-03', '2026-04-04', '2026-04-05', '2026-04-06',
      // 勞動節
      '2026-05-01',
      // 端午節
      '2026-06-19',
      // 中秋節／教師節 (9/25–9/28)
      '2026-09-25', '2026-09-26', '2026-09-27', '2026-09-28',
      // 國慶日 (10/9補假、10/10、10/11)
      '2026-10-09', '2026-10-10', '2026-10-11',
      // 行憲紀念日 (12/25–12/27)
      '2026-12-25', '2026-12-26', '2026-12-27'
    ],
    '一例一休': _genWeekendsOfYear(2026),
    '自訂假別B': ['2026-03-01', '2026-03-15']
  };
  let individualHolidays = ['2026-01-20', '2026-02-20'];
  let selectedHolidayGroups = ['台灣國定假日'];
  let holidays = [];
  let editingHolidayGroup = null;
  let editingHolidayDates = [];
  let persons = [
    { name: '王小明', id: 'EMP001' },
    { name: '李小華', id: 'EMP002' },
    { name: '張大偉', id: 'EMP003' },
    { name: '陳美玲', id: 'EMP004' },
    { name: '林志豪', id: 'EMP005' }
  ];
  let supervisors = ['劉經理'];
  let shifts = [

  function calcDurationHours(start, end) {
    if (!start || !end) return 0;
    const [sh, sm] = start.split(':').map(Number);
    const [eh, em] = end.split(':').map(Number);
    return Math.max(0, ((eh * 60 + em) - (sh * 60 + sm)) / 60);
  }
  function calcWorkHours(start, end, rest) {
    return Math.max(0, calcDurationHours(start, end) - (Number(rest) || 0));
  }
  // 勞基法 §35：繼續工作 4 小時至少休息 30 分鐘；僅工作 4 小時可免。
  function minRequiredRest(durationHours) {
    if (durationHours <= 4) return 0;
    return Math.floor((durationHours - 0.0001) / 4) * 0.5;
  }
  function onShiftTimeChange() {
    const start = document.getElementById('shiftStart').value;
    const end = document.getElementById('shiftEnd').value;
    const duration = calcDurationHours(start, end);
    const minRest = minRequiredRest(duration);
    const restEl = document.getElementById('shiftRest');
    const cur = parseFloat(restEl.value) || 0;
    // 若使用者尚未手動調高，則自動帶入最低法定休息
    if (cur < minRest) restEl.value = minRest;
    updateShiftHoursPreview();
  }
  function updateShiftHoursPreview() {
    const start = document.getElementById('shiftStart').value;
    const end = document.getElementById('shiftEnd').value;
    const rest = parseFloat(document.getElementById('shiftRest').value) || 0;
    const hours = calcWorkHours(start, end, rest);
    const minRest = minRequiredRest(calcDurationHours(start, end));
    const hoursEl = document.getElementById('shiftHoursPreview');
    const minEl = document.getElementById('shiftMinRest');
    if (hoursEl) hoursEl.textContent = `${hours}h`;
    if (minEl) {
      minEl.textContent = `${minRest}h`;
      minEl.classList.toggle('text-red-600', rest < minRest);
      minEl.classList.toggle('text-orange-700', rest >= minRest);
    }
  }

  function searchPersonForGroup() {
    const query = document.getElementById('searchPersonInput').value.toLowerCase().trim();

    if (!query) {
      resultsList.innerHTML = '';

    const filtered = persons.filter(p =>

    ).filter(p => !currentGroupMembers.includes(p.id));

    if (filtered.length === 0) {

  function addPersonToGroup(empId, name) {
    if (!currentGroupMembers.includes(empId)) {

  function renderSelectedPersonsInGroup() {
    const container = document.getElementById('selectedPersonsInGroup');
    if (currentGroupMembers.length === 0) {
      container.innerHTML = '<div class="text-sm text-slate-500 py-2">尚未添加人員</div>';

    container.innerHTML = currentGroupMembers.map((empId, idx) => {

        <button onclick="currentGroupMembers.splice(${idx}, 1); renderSelectedPersonsInGroup()" class="text-red-400 hover:text-red-600 text-xs">移除</button>
      </div>`;

  function editAttendanceGroup(index) {
    const group = attendanceGroups[index];
    editingGroupIndex = index;
    currentGroupMembers = [...group.members];
    currentGroupScheduleType = group.scheduleType || 'auto';
    currentGroupPunchLocations = Array.isArray(group.punchLocations) ? [...group.punchLocations] : [];
    const base = defaultWeekdayShifts();
    if (group.weekdayShifts) {
      WEEKDAYS.forEach(w => {
        const v = group.weekdayShifts[w.key];
        if (Array.isArray(v)) base[w.key] = [...v];
        else if (typeof v === 'string' && v) base[w.key] = [v];
      });
    }
    currentGroupWeekdayShifts = base;
    currentGroupWorkOnHoliday = !!group.workOnHoliday;
    document.getElementById('groupName').value = group.name;
    document.getElementById('searchPersonInput').value = '';
    document.getElementById('searchResultsList').innerHTML = '';
    document.querySelector(`input[name="scheduleType"][value="${currentGroupScheduleType}"]`).checked = true;

  function updateScheduleTypeUI() {
    const checked = document.querySelector('input[name="scheduleType"]:checked');
    currentGroupScheduleType = checked ? checked.value : 'auto';
    const block = document.getElementById('weekdayShiftsBlock');
    const footer = document.getElementById('weekdayShiftsFooter');

    const indicator = document.getElementById('weeklyHoursIndicator');
    if (currentGroupScheduleType === 'auto') {
      block.classList.remove('hidden');

  function renderWeekdayShifts() {
    const block = document.getElementById('weekdayShiftsBlock');
    if (!block) return;
    const options = shifts.map(s => s.name);
    if (options.length === 0) {
      block.innerHTML = '<div class="px-3 py-3 text-sm text-slate-500">尚未設定班別，請先到「班別排班」新增。</div>';
      return;
    }
    block.innerHTML = WEEKDAYS.map(w => {
      const selected = currentGroupWeekdayShifts[w.key] || [];
      const opts = options.map(o => `
        <label class="flex items-center gap-1 text-sm cursor-pointer px-2 py-1 hover:bg-slate-50 rounded">
          <input type="checkbox" value="${o}" ${selected.includes(o) ? 'checked' : ''} onchange="toggleWeekdayShift('${w.key}','${o}', this.checked)">
          <span>${o}</span>
        </label>`).join('');
      return `<div class="flex items-stretch border-b border-slate-200 last:border-b-0">
        <div class="px-3 py-2 bg-slate-50 text-sm text-slate-700 w-20 flex items-center justify-center border-r border-slate-200">${w.label}</div>
        <div class="flex-1 px-2 py-1 flex flex-wrap gap-x-3 gap-y-1">${opts}</div>
      </div>`;
    }).join('');
  }

  function toggleWeekdayShift(dayKey, shiftName, checked) {
    if (!currentGroupWeekdayShifts[dayKey]) currentGroupWeekdayShifts[dayKey] = [];
    const arr = currentGroupWeekdayShifts[dayKey];
    const idx = arr.indexOf(shiftName);
    if (checked && idx === -1) arr.push(shiftName);
    if (!checked && idx > -1) arr.splice(idx, 1);
    updateWeeklyHoursIndicator();
  }

  const MAX_WEEKLY_HOURS = 40;
  function calcWeeklyHours(weekdayShifts) {
    const shiftMap = {};
    (shifts || []).forEach(s => { shiftMap[s.name] = Number(s.hours) || 0; });
    let total = 0;
    Object.values(weekdayShifts || {}).forEach(arr => {
      if (!Array.isArray(arr)) return;
      arr.forEach(n => { total += shiftMap[n] || 0; });
    });
    return total;
  }
  function updateWeeklyHoursIndicator() {
    const el = document.getElementById('weeklyHoursValue');
    const wrap = document.getElementById('weeklyHoursIndicator');
    if (!el || !wrap) return;
    const total = calcWeeklyHours(currentGroupWeekdayShifts);
    el.textContent = `${total} h`;
    wrap.classList.remove('bg-slate-50','border-slate-200','bg-red-50','border-red-200','bg-amber-50','border-amber-200');
    el.classList.remove('text-slate-700','text-red-600','text-amber-600');
    if (total > MAX_WEEKLY_HOURS) {
      wrap.classList.add('bg-red-50','border-red-200');
      el.classList.add('text-red-600');
    } else if (total === MAX_WEEKLY_HOURS) {
      wrap.classList.add('bg-amber-50','border-amber-200');
      el.classList.add('text-amber-600');
    } else {
      wrap.classList.add('bg-slate-50','border-slate-200');
      el.classList.add('text-slate-700');
    }
  }

  function confirmAddAttendanceGroup() {
    const groupName = document.getElementById('groupName').value.trim();
    if (!groupName) {
      alert('請輸入考勤組名稱');
      return;
    }
    if (currentGroupMembers.length === 0) {
      alert('請至少添加一位人員');
      return;
    }
    if (currentGroupScheduleType === 'auto') {
      const weekly = calcWeeklyHours(currentGroupWeekdayShifts);
      if (weekly > MAX_WEEKLY_HOURS) {
        alert(`每週總工時 ${weekly}h 已超過上限 ${MAX_WEEKLY_HOURS}h，請調整班別設定。`);
        return;
      }
    }
    const payload = {
      name: groupName,
      members: [...currentGroupMembers],
      scheduleType: currentGroupScheduleType,
      weekdayShifts: { ...currentGroupWeekdayShifts },
      punchLocations: [...currentGroupPunchLocations],
      workOnHoliday: !!currentGroupWorkOnHoliday
    };
    if (editingGroupIndex >= 0) {
      attendanceGroups[editingGroupIndex] = payload;
    } else {
      attendanceGroups.push(payload);
    }
    editingGroupIndex = -1;
    renderAttendanceGroups();
    closeAttendanceGroupModal();
  }

  function calcHours(start, end) {
    const [sh, sm] = start.split(':').map(Number);
    const [eh, em] = end.split(':').map(Number);
    return ((eh * 60 + em) - (sh * 60 + sm)) / 60;
  }

    // 新增班表到列表
    schedules.push({ name, branch, start, end });

    // 更新班表資訊

  function confirmAddShift() {
    const name = document.getElementById('shiftName').value.trim();
    const shortName = document.getElementById('shiftShortName').value.trim();
    const start = document.getElementById('shiftStart').value;
    const end = document.getElementById('shiftEnd').value;
    const rest = parseFloat(document.getElementById('shiftRest').value) || 0;
    const otStart = document.getElementById('shiftOtStart').value || '';
    const otEnd = document.getElementById('shiftOtEnd').value || '';
    const hours = calcWorkHours(start, end, rest);

    if (!name) {
      alert('請輸入班別名稱');
      return;
    }
    if (!shortName) {
      alert('請輸入班別簡稱');
      return;
    }
    if (calcDurationHours(start, end) <= 0) {
      alert('結束時間必須晚於起始時間');
      return;
    }
    if (rest < 0) {
      alert('休息時數不可為負數');
      return;
    }
    const minRest = minRequiredRest(calcDurationHours(start, end));
    if (rest < minRest) {
      alert(`依勞基法，此時段至少需休息 ${minRest}h（現設 ${rest}h）。`);
      return;
    }
    if (hours <= 0) {
      alert('總工時 = 結束-起始-休息，請調整使總工時大於 0');
      return;
    }

    if (editingShiftIndex >= 0 && shifts[editingShiftIndex]) {
      const oldName = shifts[editingShiftIndex].name;
      shifts[editingShiftIndex] = { name, shortName, start, end, hours, rest, otStart, otEnd };
      // 同步更新考勤組中引用此班別名稱
      if (oldName !== name) {
        attendanceGroups.forEach(g => {
          if (!g.weekdayShifts) return;
          Object.keys(g.weekdayShifts).forEach(k => {
            const arr = g.weekdayShifts[k];
            if (Array.isArray(arr)) {
              g.weekdayShifts[k] = arr.map(n => n === oldName ? name : n);
            }
          });
        });
        renderAttendanceGroups();
      }
    } else {
      shifts.push({ name, shortName, start, end, hours, rest, otStart, otEnd });
    }
    renderShifts();
    closeShiftModal();
  }
