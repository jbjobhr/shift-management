<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選取班表可用項目</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    html, body { height: 100%; width: 100%; }
    .picker-row { padding: 6px 8px; border-bottom: 1px solid #e2e8f0; cursor: pointer; font-size: 14px; }
    .picker-row:hover { background: #f8fafc; }
    .picker-row.active { background: #dbeafe; color: #1e40af; }
    input[type="text"] { border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 10px; font-size: 14px; }
    input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
    .row-edit-btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #475569;
      font-size: 12px;
      line-height: 1;
      padding: 6px 10px;
      border-radius: 9999px;
      transition: all 0.15s ease;
    }
    .row-edit-btn:hover {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
    }
    .scope-select {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 14px;
      color: #334155;
      background: #ffffff;
      min-width: 220px;
    }
    .scope-select:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(96,165,250,0.15);
    }
  </style>
 </head>
 <body class="h-full bg-slate-50 w-full">
  <div class="min-h-full w-full flex flex-col">
   <header class="bg-[#1e3a5f] text-white px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold tracking-wide">班表可用項目設定</h1>
    <a id="backLinkTop" href="shift-setting.html" class="px-4 py-1.5 rounded-md text-sm font-medium bg-white/10 hover:bg-white/20">返回</a>
   </header>
   <main class="flex-1 p-6 overflow-auto">
    <div class="max-w-6xl mx-auto space-y-5">
      <div class="bg-white rounded-xl shadow-sm p-4">
        <h2 class="text-lg font-bold text-slate-800">選擇此班表會用到的項目</h2>
        <p class="text-sm text-slate-500 mt-1">可複選多筆，再用左右箭頭移動。</p>
        <div class="mt-3 grid grid-cols-1 md:grid-cols-2 gap-3">
          <div class="flex items-center gap-2">
            <label for="scopeBranchSelect" class="text-sm text-slate-600 whitespace-nowrap">分公司/分店/案場</label>
            <select id="scopeBranchSelect" class="scope-select" onchange="setScopeBranchFilter(this.value)"></select>
          </div>
          <div class="flex items-center gap-2">
            <label for="scopeDepartmentSelect" class="text-sm text-slate-600 whitespace-nowrap">部門/工作地</label>
            <select id="scopeDepartmentSelect" class="scope-select" onchange="setScopeDepartmentFilter(this.value)"></select>
          </div>
        </div>
        <div class="mt-3 flex items-center gap-2">
          <label for="scopeKeywordInput" class="text-sm text-slate-600 whitespace-nowrap">關鍵字搜尋</label>
          <input
            id="scopeKeywordInput"
            type="text"
            class="w-full md:max-w-md"
            placeholder="輸入班別、假別組或考勤組關鍵字"
            oninput="setScopeKeywordFilter(this.value)"
          >
        </div>
      </div>

      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 space-y-3">
        <div class="flex items-center justify-between gap-3">
          <div>
            <h3 class="font-semibold text-slate-800">班別</h3>
            <p class="text-xs text-slate-500">設定此班表允許使用的班別。</p>
          </div>
          <div class="flex items-center gap-2">
            <button type="button" onclick="goEditPage('shifts')" class="px-3 py-1.5 bg-white border border-slate-300 text-slate-700 rounded-md text-sm hover:bg-slate-50">編輯</button>
            <button type="button" onclick="selectAllAllowedAvailable('shifts')" class="px-3 py-1.5 bg-blue-600 text-white rounded-md text-sm">全部加入</button>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-4 items-start">
          <div>
            <input id="allowedPickerAvailableSearch-shifts" type="text" placeholder="搜尋" class="w-full mb-2 hidden" oninput="renderAllowedPickerSection('shifts')">
            <div id="allowedPickerAvailableList-shifts" class="border border-slate-200 rounded-md bg-white max-h-56 overflow-y-auto"></div>
            <div class="text-center text-sm text-slate-600 mt-1">可選擇的項目</div>
          </div>
          <div class="flex md:flex-col gap-2 justify-center items-center pt-8">
            <button type="button" onclick="moveAllowedToSelected('shifts')" class="px-2 py-1 border rounded-md bg-white">→</button>
            <button type="button" onclick="moveAllowedToAvailable('shifts')" class="px-2 py-1 border rounded-md bg-white">←</button>
          </div>
          <div>
            <input id="allowedPickerSelectedSearch-shifts" type="text" placeholder="搜尋" class="w-full mb-2 hidden" oninput="renderAllowedPickerSection('shifts')">
            <div id="allowedPickerSelectedList-shifts" class="border border-slate-200 rounded-md bg-white max-h-56 overflow-y-auto"></div>
            <div class="text-center text-sm text-slate-600 mt-1">已選擇的項目</div>
          </div>
        </div>
      </section>

      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 space-y-3">
        <div class="flex items-center justify-between gap-3">
          <div>
            <h3 class="font-semibold text-slate-800">假別組</h3>
            <p class="text-xs text-slate-500">設定此班表允許使用的假別組。</p>
          </div>
          <div class="flex items-center gap-2">
            <button type="button" onclick="goEditPage('holidayGroups')" class="px-3 py-1.5 bg-white border border-slate-300 text-slate-700 rounded-md text-sm hover:bg-slate-50">編輯</button>
            <button type="button" onclick="selectAllAllowedAvailable('holidayGroups')" class="px-3 py-1.5 bg-blue-600 text-white rounded-md text-sm">全部加入</button>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-4 items-start">
          <div>
            <input id="allowedPickerAvailableSearch-holidayGroups" type="text" placeholder="搜尋" class="w-full mb-2 hidden" oninput="renderAllowedPickerSection('holidayGroups')">
            <div id="allowedPickerAvailableList-holidayGroups" class="border border-slate-200 rounded-md bg-white max-h-56 overflow-y-auto"></div>
            <div class="text-center text-sm text-slate-600 mt-1">可選擇的項目</div>
          </div>
          <div class="flex md:flex-col gap-2 justify-center items-center pt-8">
            <button type="button" onclick="moveAllowedToSelected('holidayGroups')" class="px-2 py-1 border rounded-md bg-white">→</button>
            <button type="button" onclick="moveAllowedToAvailable('holidayGroups')" class="px-2 py-1 border rounded-md bg-white">←</button>
          </div>
          <div>
            <input id="allowedPickerSelectedSearch-holidayGroups" type="text" placeholder="搜尋" class="w-full mb-2 hidden" oninput="renderAllowedPickerSection('holidayGroups')">
            <div id="allowedPickerSelectedList-holidayGroups" class="border border-slate-200 rounded-md bg-white max-h-56 overflow-y-auto"></div>
            <div class="text-center text-sm text-slate-600 mt-1">已選擇的項目</div>
          </div>
        </div>
      </section>

      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 space-y-3">
        <div class="flex items-center justify-between gap-3">
          <div>
            <h3 class="font-semibold text-slate-800">考勤組</h3>
            <p class="text-xs text-slate-500">設定此班表允許使用的考勤組。</p>
          </div>
          <div class="flex items-center gap-2">
            <button type="button" onclick="goEditPage('attendanceGroups')" class="px-3 py-1.5 bg-white border border-slate-300 text-slate-700 rounded-md text-sm hover:bg-slate-50">編輯</button>
            <button type="button" onclick="selectAllAllowedAvailable('attendanceGroups')" class="px-3 py-1.5 bg-blue-600 text-white rounded-md text-sm">全部加入</button>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-4 items-start">
          <div>
            <input id="allowedPickerAvailableSearch-attendanceGroups" type="text" placeholder="搜尋" class="w-full mb-2 hidden" oninput="renderAllowedPickerSection('attendanceGroups')">
            <div id="allowedPickerAvailableList-attendanceGroups" class="border border-slate-200 rounded-md bg-white max-h-56 overflow-y-auto"></div>
            <div class="text-center text-sm text-slate-600 mt-1">可選擇的項目</div>
          </div>
          <div class="flex md:flex-col gap-2 justify-center items-center pt-8">
            <button type="button" onclick="moveAllowedToSelected('attendanceGroups')" class="px-2 py-1 border rounded-md bg-white">→</button>
            <button type="button" onclick="moveAllowedToAvailable('attendanceGroups')" class="px-2 py-1 border rounded-md bg-white">←</button>
          </div>
          <div>
            <input id="allowedPickerSelectedSearch-attendanceGroups" type="text" placeholder="搜尋" class="w-full mb-2 hidden" oninput="renderAllowedPickerSection('attendanceGroups')">
            <div id="allowedPickerSelectedList-attendanceGroups" class="border border-slate-200 rounded-md bg-white max-h-56 overflow-y-auto"></div>
            <div class="text-center text-sm text-slate-600 mt-1">已選擇的項目</div>
          </div>
        </div>
      </section>

      <div class="bg-white rounded-xl shadow-sm p-4 flex justify-end gap-2">
        <button onclick="goBackWithoutSave()" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-md">取消</button>
        <button onclick="saveAndBack()" class="px-4 py-2 text-sm bg-[#1e3a5f] text-white rounded-md hover:bg-[#2a4f7f]">儲存</button>
      </div>
    </div>
   </main>
  </div>

  <script>
  const ALLOWED_PICKER_TYPES = ['shifts', 'holidayGroups', 'attendanceGroups'];
  const fallbackGlobal = {
    schedules: [],
    shifts: [],
    holidayGroups: {},
    attendanceGroups: []
  };

  let G = fallbackGlobal;
  try {
    const raw = localStorage.getItem('shiftMgmt:global');
    if (raw) G = Object.assign({}, fallbackGlobal, JSON.parse(raw));
  } catch (e) {
    console.warn('load global failed', e);
  }

  const params = new URLSearchParams(location.search);
  const _rawIndex = parseInt(params.get('index') || '0', 10);
  const isNewSchedule = _rawIndex === -1;
  const currentScheduleIndex = isNewSchedule ? -1 : Math.max(0, _rawIndex || 0);
  const returnTo = params.get('returnTo') || 'shift-setting.html';

  function getReturnUrl() {
    const p = new URLSearchParams();
    p.set('index', String(currentScheduleIndex));
    return `${returnTo}?${p.toString()}`;
  }

  document.getElementById('backLinkTop').href = getReturnUrl();

  const schedules = Array.isArray(G.schedules) ? G.schedules : [];
  const NEW_SCHEDULE_DRAFT_KEY = 'shiftMgmt:newScheduleDraft';
  let newScheduleDraft = {};
  if (isNewSchedule) {
    try {
      const rawDraft = localStorage.getItem(NEW_SCHEDULE_DRAFT_KEY);
      if (rawDraft) newScheduleDraft = JSON.parse(rawDraft) || {};
    } catch (e) {}
  }
  const schedule = isNewSchedule ? newScheduleDraft : (schedules[currentScheduleIndex] || {});
  const currentBranch = String(
    isNewSchedule
      ? (newScheduleDraft.selectedBranch || newScheduleDraft.branch || G.selectedBranch || '')
      : (schedule.branch || G.selectedBranch || '')
  ).trim();
  let scopeBranchFilter = '';
  let scopeBranchOptions = [];

  let scopeDepartmentFilter = '';
  let scopeKeywordFilter = '';

  let scopeDepartmentOptions = [];

  function cloneDeep(v) {
    return JSON.parse(JSON.stringify(v));
  }

  let globalShiftTemplates = {};
  let globalHolidayGroupTemplates = {};
  let globalAttendanceGroupTemplates = {};
  let shiftBranchesMap = {};
  let holidayGroupBranchesMap = {};
  let attendanceGroupBranchesMap = {};

  function addBranchRef(map, name, branch) {
    if (!name || !branch) return;
    if (!map[name]) map[name] = new Set();
    map[name].add(branch);
  }

  function buildGlobalTemplates() {
    globalShiftTemplates = {};
    globalHolidayGroupTemplates = {};
    globalAttendanceGroupTemplates = {};
    shiftBranchesMap = {};
    holidayGroupBranchesMap = {};
    attendanceGroupBranchesMap = {};

    const collectShift = (s, branch = '') => {
      if (!s || !s.name) return;
      addBranchRef(shiftBranchesMap, s.name, branch);
      if (globalShiftTemplates[s.name]) return;
      globalShiftTemplates[s.name] = cloneDeep(s);
    };
    const collectHoliday = (obj, branch = '') => {
      if (!obj || typeof obj !== 'object') return;
      Object.keys(obj).forEach((k) => {
        if (!globalHolidayGroupTemplates[k]) globalHolidayGroupTemplates[k] = cloneDeep(obj[k]);
        addBranchRef(holidayGroupBranchesMap, k, branch);
      });
    };
    const collectAttendance = (g, branch = '') => {
      if (!g || !g.name) return;
      addBranchRef(attendanceGroupBranchesMap, g.name, branch);
      if (globalAttendanceGroupTemplates[g.name]) return;
      globalAttendanceGroupTemplates[g.name] = cloneDeep(g);
    };

    (Array.isArray(G.shifts) ? G.shifts : []).forEach(collectShift);
    collectHoliday(G.holidayGroups);
    (Array.isArray(G.attendanceGroups) ? G.attendanceGroups : []).forEach(collectAttendance);

    schedules.forEach((sched) => {
      const branch = String((sched && sched.branch) || '').trim();
      (Array.isArray(sched.shifts) ? sched.shifts : []).forEach(s => collectShift(s, branch));
      collectHoliday(sched.holidayGroups, branch);
      (Array.isArray(sched.attendanceGroups) ? sched.attendanceGroups : []).forEach(g => collectAttendance(g, branch));
    });
  }

  buildGlobalTemplates();

  function getDefaultAllowed() {
    if (isNewSchedule) {
      // 新班表：已選從 draft 讀，若無則為空
      return {
        shiftNames: Array.isArray(schedule.allowedShiftNames) ? [...schedule.allowedShiftNames] : [],
        holidayGroupNames: Array.isArray(schedule.allowedHolidayGroupNames) ? [...schedule.allowedHolidayGroupNames] : [],
        attendanceGroupNames: Array.isArray(schedule.allowedAttendanceGroupNames) ? [...schedule.allowedAttendanceGroupNames] : []
      };
    }
    const fallbackHolidayNames = Object.keys(globalHolidayGroupTemplates || {});
    return {
      shiftNames: (Array.isArray(schedule.shifts) ? schedule.shifts : []).map(s => s.name).filter(Boolean),
      holidayGroupNames: Object.keys(schedule.holidayGroups || {}).length ? Object.keys(schedule.holidayGroups || {}) : fallbackHolidayNames,
      attendanceGroupNames: (Array.isArray(schedule.attendanceGroups) ? schedule.attendanceGroups : []).map(g => g.name).filter(Boolean)
    };
  }

  const defaults = getDefaultAllowed();
  let allowedShiftNames = [...defaults.shiftNames];
  let allowedHolidayGroupNames = [...defaults.holidayGroupNames];
  let allowedAttendanceGroupNames = [...defaults.attendanceGroupNames];

  if (!isNewSchedule && !schedule.allowedScopeCustomized) {
    const fallbackHolidayNames = Object.keys(globalHolidayGroupTemplates || {});
    allowedShiftNames = (Array.isArray(schedule.shifts) ? schedule.shifts : []).map(s => s.name).filter(Boolean);
    allowedHolidayGroupNames = Object.keys(schedule.holidayGroups || {}).length ? Object.keys(schedule.holidayGroups || {}) : fallbackHolidayNames;
    allowedAttendanceGroupNames = (Array.isArray(schedule.attendanceGroups) ? schedule.attendanceGroups : []).map(g => g.name).filter(Boolean);
  }

  allowedShiftNames = allowedShiftNames.filter(name => Object.prototype.hasOwnProperty.call(globalShiftTemplates, name));
  allowedHolidayGroupNames = allowedHolidayGroupNames.filter(name => Object.prototype.hasOwnProperty.call(globalHolidayGroupTemplates, name));
  allowedAttendanceGroupNames = allowedAttendanceGroupNames.filter(name => Object.prototype.hasOwnProperty.call(globalAttendanceGroupTemplates, name));

  const allowedPickerState = {
    shifts: { available: [], selected: [], activeAvailable: [], activeSelected: [] },
    holidayGroups: { available: [], selected: [], activeAvailable: [], activeSelected: [] },
    attendanceGroups: { available: [], selected: [], activeAvailable: [], activeSelected: [] }
  };

  const SYSTEM_LABELS = {
    general: '一般（單週）',
    twoWeek: '兩週變形',
    fourWeek: '四週變形',
    eightWeek: '八週變形'
  };

  function formatHoursValue(v) {
    const n = Number(v);
    if (!Number.isFinite(n)) return '0';
    return Number.isInteger(n) ? String(n) : String(n);
  }

  function formatRestHours(v) {
    const n = Number(v);
    if (!Number.isFinite(n)) return '0.0';
    return n.toFixed(1);
  }

  function getRowMetaLines(type, name) {
    if (type === 'shifts') {
      const s = globalShiftTemplates[name];
      if (!s) return [];
      const before = Number.parseInt(String(s.punchBeforeMinutes), 10);
      const after = Number.parseInt(String(s.punchAfterMinutes), 10);
      return [
        `${s.start || '-'} - ${s.end || '-'}`,
        `工時 ${formatHoursValue(s.hours)}h`,
        `休息 ${formatRestHours(s.rest)}h`,
        `可打卡 前${Number.isNaN(before) ? 30 : before}/後${Number.isNaN(after) ? 30 : after}分`
      ];
    }

    if (type === 'holidayGroups') {
      const days = globalHolidayGroupTemplates[name];
      const count = Array.isArray(days) ? days.length : 0;
      return [`${count} 個假日`];
    }

    if (type === 'attendanceGroups') {
      const g = globalAttendanceGroupTemplates[name];
      if (!g) return [];
      const lines = [];
      const systemType = g.systemType || 'general';
      lines.push(SYSTEM_LABELS[systemType] || systemType);
      if (g.workOnHoliday) lines.push('假日加班');
      if (systemType !== 'general') {
        lines.push(`生效日期：${g.effectiveDate || '未設定'}`);
        const rotatingDetails = Array.isArray(g.rotatingDetails)
          ? g.rotatingDetails
          : (Array.isArray(g.details) ? g.details : []);
        rotatingDetails.slice(0, 3).forEach((d) => {
          const shiftName = d.shiftName || d.shiftCode || '未命名';
          const days = Math.max(1, parseInt(d.days, 10) || 1);
          lines.push(`${shiftName} × ${days} 天`);
        });
      }
      return lines;
    }

    return [];
  }

  function getAllowedPickerConfig(type) {
    const allSource = type === 'holidayGroups'
      ? Object.keys(globalHolidayGroupTemplates)
      : type === 'attendanceGroups'
        ? Object.keys(globalAttendanceGroupTemplates)
        : Object.keys(globalShiftTemplates);
    const all = allSource.filter(name => nameInScopeBranch(type, name));

    if (type === 'holidayGroups') {
      return { all, selected: allowedHolidayGroupNames.filter(name => all.includes(name)) };
    }
    if (type === 'attendanceGroups') {
      return { all, selected: allowedAttendanceGroupNames.filter(name => all.includes(name)) };
    }
    return { all, selected: allowedShiftNames.filter(name => all.includes(name)) };
  }

  function getBranchMapByType(type) {
    if (type === 'holidayGroups') return holidayGroupBranchesMap;
    if (type === 'attendanceGroups') return attendanceGroupBranchesMap;
    return shiftBranchesMap;
  }

  function nameInScopeBranch(type, name) {
    if (!scopeBranchFilter) return true;
    const branchMap = getBranchMapByType(type);
    const refs = branchMap[name];
    if (!refs || refs.size === 0) return false;
    return refs.has(scopeBranchFilter);
  }

  function normalizeScopeTokens(value) {
    if (value == null) return [];
    if (typeof value === 'string') {
      const v = value.trim();
      return v ? [v] : [];
    }
    if (Array.isArray(value)) return value.flatMap(item => normalizeScopeTokens(item));
    if (typeof value === 'object') {
      return Object.keys(value).flatMap(key => normalizeScopeTokens(value[key]));
    }
    return [];
  }

  function splitScopeValues(raw) {
    return String(raw || '')
      .split(/[\/,，、；;｜|\s]+/)
      .map(v => v.trim())
      .filter(Boolean);
  }

  function getScopeSource(type, name) {
    if (type === 'shifts') return globalShiftTemplates[name] || null;
    if (type === 'attendanceGroups') return globalAttendanceGroupTemplates[name] || null;
    if (type === 'holidayGroups') return globalHolidayGroupTemplates[name] || null;
    return null;
  }

  function getTokensByKeys(source, keys) {
    const tokens = [];
    if (source && typeof source === 'object') {
      keys.forEach((k) => {
        if (Object.prototype.hasOwnProperty.call(source, k)) {
          tokens.push(...normalizeScopeTokens(source[k]));
        }
      });
    }
    return Array.from(new Set(tokens.filter(Boolean).map(v => String(v).trim()).filter(Boolean)));
  }

  function getItemDepartmentTokens(type, name) {
    const src = getScopeSource(type, name);
    return getTokensByKeys(src, [
      'department', 'departments', 'departmentName', 'departmentNames',
      'worksite', 'worksites', 'workplace', 'workplaces',
      'location', 'locations'
    ]);
  }

  function getItemBranchTokens(type, name) {
    const src = getScopeSource(type, name);
    return getTokensByKeys(src, ['branch', 'branches', 'branchName', 'branchNames']);
  }

  function itemMatchesBranch(type, name) {
    return nameInScopeBranch(type, name);
  }

  function itemMatchesScope(type, name) {
    if (!scopeDepartmentFilter) return true;
    const q = scopeDepartmentFilter.toLowerCase();
    const haystacks = getItemDepartmentTokens(type, name).map(v => v.toLowerCase());
    if (!haystacks.length) return true;
    return haystacks.some(v => v.includes(q));
  }

  function buildScopeBranchOptions() {
    const all = new Set();
    if (Array.isArray(G.branches)) {
      G.branches.forEach(b => splitScopeValues(b).forEach(v => all.add(v)));
    }
    if (schedule && schedule.branch) {
      splitScopeValues(schedule.branch).forEach(v => all.add(v));
    }
    if (isNewSchedule && newScheduleDraft && newScheduleDraft.branch) {
      splitScopeValues(newScheduleDraft.branch).forEach(v => all.add(v));
    }
    if (currentBranch) {
      splitScopeValues(currentBranch).forEach(v => all.add(v));
    }
    if (scopeBranchFilter) {
      splitScopeValues(scopeBranchFilter).forEach(v => all.add(v));
    }
    scopeBranchOptions = Array.from(all).filter(Boolean).sort((a, b) => a.localeCompare(b, 'zh-Hant'));
  }

  function itemMatchesKeyword(type, name) {
    if (!scopeKeywordFilter) return true;
    const q = scopeKeywordFilter.toLowerCase();
    const values = [name, ...getRowMetaLines(type, name)].map(v => String(v || '').toLowerCase());
    return values.some(v => v.includes(q));
  }

  function buildScopeDepartmentOptions() {
    const all = new Set();
    if (Array.isArray(G.departments)) {
      G.departments.forEach(d => splitScopeValues(d).forEach(v => all.add(v)));
    }
    if (schedule && schedule.department) {
      splitScopeValues(schedule.department).forEach(v => all.add(v));
    }
    if (isNewSchedule && newScheduleDraft && newScheduleDraft.department) {
      splitScopeValues(newScheduleDraft.department).forEach(v => all.add(v));
    }
    if (scopeDepartmentFilter) {
      splitScopeValues(scopeDepartmentFilter).forEach(v => all.add(v));
    }

    scopeDepartmentOptions = Array.from(all).filter(Boolean).sort((a, b) => a.localeCompare(b, 'zh-Hant'));
  }

  function renderScopeFilters() {
    const branchSelect = document.getElementById('scopeBranchSelect');
    const deptSelect = document.getElementById('scopeDepartmentSelect');
    if (branchSelect) {
      buildScopeBranchOptions();
      branchSelect.innerHTML = `<option value="">全部</option>` + scopeBranchOptions.map(v => `<option value="${v}">${v}</option>`).join('');
      branchSelect.value = scopeBranchFilter;
      if (branchSelect.value !== scopeBranchFilter) branchSelect.value = '';
    }
    if (!deptSelect) return;
    buildScopeDepartmentOptions();
    deptSelect.innerHTML = `<option value="">全部</option>` + scopeDepartmentOptions.map(v => `<option value="${v}">${v}</option>`).join('');
    deptSelect.value = scopeDepartmentFilter;
    if (deptSelect.value !== scopeDepartmentFilter) deptSelect.value = '';
  }

  function setScopeBranchFilter(value) {
    scopeBranchFilter = String(value || '').trim();
    initAllowedPicker();
  }

  function setScopeDepartmentFilter(value) {
    scopeDepartmentFilter = String(value || '').trim();
    ALLOWED_PICKER_TYPES.forEach((type) => {
      const state = getAllowedPickerState(type);
      if (state) {
        state.activeAvailable = [];
        state.activeSelected = [];
      }
    });
    renderAllowedPicker();
  }

  function setScopeKeywordFilter(value) {
    scopeKeywordFilter = String(value || '').trim();
    ALLOWED_PICKER_TYPES.forEach((type) => {
      const state = getAllowedPickerState(type);
      if (state) {
        state.activeAvailable = [];
        state.activeSelected = [];
      }
    });
    renderAllowedPicker();
  }

  function getAllowedPickerState(type) {
    return allowedPickerState[type];
  }

  function setAllowedPickerActive(type, side, name) {
    const state = getAllowedPickerState(type);
    if (!state) return;
    if (side === 'available') {
      state.activeAvailable = state.activeAvailable.includes(name)
        ? state.activeAvailable.filter(item => item !== name)
        : [...state.activeAvailable, name];
      state.activeSelected = [];
    } else {
      state.activeSelected = state.activeSelected.includes(name)
        ? state.activeSelected.filter(item => item !== name)
        : [...state.activeSelected, name];
      state.activeAvailable = [];
    }
    renderAllowedPickerSection(type);
  }

  function renderAllowedPickerSection(type) {
    const state = getAllowedPickerState(type);
    const availableSearch = document.getElementById(`allowedPickerAvailableSearch-${type}`);
    const selectedSearch = document.getElementById(`allowedPickerSelectedSearch-${type}`);
    const leftQ = availableSearch ? availableSearch.value.toLowerCase().trim() : '';
    const rightQ = selectedSearch ? selectedSearch.value.toLowerCase().trim() : '';
    const left = state.available
      .filter(name => itemMatchesBranch(type, name))
      .filter(name => itemMatchesScope(type, name))
      .filter(name => itemMatchesKeyword(type, name))
      .filter(name => name.toLowerCase().includes(leftQ));
    const right = state.selected
      .filter(name => itemMatchesBranch(type, name))
      .filter(name => itemMatchesScope(type, name))
      .filter(name => itemMatchesKeyword(type, name))
      .filter(name => name.toLowerCase().includes(rightQ));
    const leftBox = document.getElementById(`allowedPickerAvailableList-${type}`);
    const rightBox = document.getElementById(`allowedPickerSelectedList-${type}`);

    const renderRow = (name, side) => {
      const isActive = side === 'available'
        ? state.activeAvailable.includes(name)
        : state.activeSelected.includes(name);
      const meta = getRowMetaLines(type, name)
        .map(line => `<div class="text-xs text-slate-500 leading-4 truncate" title="${line}">${line}</div>`)
        .join('');
      return `<div class="picker-row ${isActive ? 'active' : ''}" onclick='setAllowedPickerActive(${JSON.stringify(type)}, ${JSON.stringify(side)}, ${JSON.stringify(name)})'>
        <div class="flex items-start justify-between gap-2">
          <div class="font-medium text-slate-800 truncate" title="${name}">${name}</div>
          <button type="button" class="row-edit-btn" onclick='event.stopPropagation();goEditItem(${JSON.stringify(type)}, ${JSON.stringify(name)})'>編輯</button>
        </div>
        ${meta ? `<div class="mt-1 space-y-0.5">${meta}</div>` : ''}
      </div>`;
    };

    if (leftBox) {
      leftBox.innerHTML = left.map(name => renderRow(name, 'available')).join('') || '<div class="p-2 text-sm text-slate-500">無可選項目</div>';
    }
    if (rightBox) {
      rightBox.innerHTML = right.map(name => renderRow(name, 'selected')).join('') || '<div class="p-2 text-sm text-slate-500">尚未選擇</div>';
    }
  }

  function renderAllowedPicker() {
    ALLOWED_PICKER_TYPES.forEach(renderAllowedPickerSection);
  }

  function getAttendanceGroupIndexByName(name) {
    const list = Array.isArray(schedule.attendanceGroups) ? schedule.attendanceGroups : [];
    return list.findIndex(g => g && g.name === name);
  }

  function goEditPage(type) {
    const params = new URLSearchParams();
    if (isNewSchedule) {
      params.set('source', 'new');
      if (type === 'shifts') {
        window.location.href = 'shift-setting-new.html';
        return;
      }
      if (type === 'holidayGroups') {
        window.location.href = `holiday-group.html?${params.toString()}`;
        return;
      }
      window.location.href = `shift-group.html?${params.toString()}`;
      return;
    }

    params.set('index', String(currentScheduleIndex));
    if (type === 'shifts') {
      window.location.href = `shift-setting.html?${params.toString()}`;
      return;
    }
    if (type === 'holidayGroups') {
      window.location.href = `holiday-group.html?${params.toString()}`;
      return;
    }
    window.location.href = `shift-group.html?${params.toString()}`;
  }

  function goEditItem(type, name) {
    const params = new URLSearchParams();
    if (isNewSchedule) {
      params.set('source', 'new');
      params.set('index', '-1');
      if (type === 'shifts') {
        params.set('editShiftName', name);
        window.location.href = `shift-setting-new.html?${params.toString()}`;
        return;
      }
      if (type === 'holidayGroups') {
        params.set('groupName', name);
        window.location.href = `holiday-group.html?${params.toString()}`;
        return;
      }
      const groupIndex = getAttendanceGroupIndexByName(name);
      if (groupIndex >= 0) params.set('groupIndex', String(groupIndex));
      window.location.href = `shift-group.html?${params.toString()}`;
      return;
    }

    params.set('index', String(currentScheduleIndex));
    if (type === 'shifts') {
      params.set('editShiftName', name);
      window.location.href = `shift-setting.html?${params.toString()}`;
      return;
    }
    if (type === 'holidayGroups') {
      params.set('groupName', name);
      window.location.href = `holiday-group.html?${params.toString()}`;
      return;
    }
    const groupIndex = getAttendanceGroupIndexByName(name);
    if (groupIndex >= 0) params.set('groupIndex', String(groupIndex));
    window.location.href = `shift-group.html?${params.toString()}`;
  }

  function moveAllowedToSelected(type) {
    const state = getAllowedPickerState(type);
    if (!state || state.activeAvailable.length === 0) return;
    state.selected = Array.from(new Set([...state.selected, ...state.activeAvailable]));
    state.available = state.available.filter(name => !state.activeAvailable.includes(name));
    state.activeAvailable = [];
    renderAllowedPickerSection(type);
  }

  function moveAllowedToAvailable(type) {
    const state = getAllowedPickerState(type);
    if (!state || state.activeSelected.length === 0) return;
    state.available = Array.from(new Set([...state.available, ...state.activeSelected]));
    state.selected = state.selected.filter(name => !state.activeSelected.includes(name));
    state.activeSelected = [];
    renderAllowedPickerSection(type);
  }

  function selectAllAllowedAvailable(type) {
    const state = getAllowedPickerState(type);
    if (!state) return;
    state.selected = Array.from(new Set([...state.selected, ...state.available]));
    state.available = [];
    state.activeAvailable = [];
    renderAllowedPickerSection(type);
  }

  function initAllowedPicker() {
    ALLOWED_PICKER_TYPES.forEach((type) => {
      const cfg = getAllowedPickerConfig(type);
      const state = getAllowedPickerState(type);
      state.selected = [...cfg.selected];
      state.available = cfg.all.filter(name => !state.selected.includes(name));
      state.activeAvailable = [];
      state.activeSelected = [];
    });
    renderAllowedPicker();
  }

  function saveAndBack() {
    const selectedShiftNames = [...allowedPickerState.shifts.selected];
    const selectedHolidayNames = [...allowedPickerState.holidayGroups.selected];
    const selectedAttendanceNames = [...allowedPickerState.attendanceGroups.selected];

    if (isNewSchedule) {
      // 新班表：把選擇結果寫回 draft
      newScheduleDraft.allowedScopeCustomized = true;
      newScheduleDraft.allowedShiftNames = selectedShiftNames;
      newScheduleDraft.allowedHolidayGroupNames = selectedHolidayNames;
      newScheduleDraft.allowedAttendanceGroupNames = selectedAttendanceNames;
      newScheduleDraft.shifts = selectedShiftNames.map(name => cloneDeep(globalShiftTemplates[name])).filter(Boolean);
      newScheduleDraft.holidayGroups = selectedHolidayNames.reduce((acc, name) => {
        if (globalHolidayGroupTemplates[name]) acc[name] = cloneDeep(globalHolidayGroupTemplates[name]);
        return acc;
      }, {});
      newScheduleDraft.attendanceGroups = selectedAttendanceNames.map(name => cloneDeep(globalAttendanceGroupTemplates[name])).filter(Boolean);
      const prevSel = Array.isArray(newScheduleDraft.selectedHolidayGroups) ? newScheduleDraft.selectedHolidayGroups : [];
      newScheduleDraft.selectedHolidayGroups = prevSel.filter(n => selectedHolidayNames.includes(n));
      if (!newScheduleDraft.selectedHolidayGroups.length && selectedHolidayNames.length) {
        newScheduleDraft.selectedHolidayGroups = [selectedHolidayNames[0]];
      }
      try { localStorage.setItem(NEW_SCHEDULE_DRAFT_KEY, JSON.stringify(newScheduleDraft)); } catch (e) {}
    } else {
      const sched = schedules[currentScheduleIndex] || {};
      sched.shifts = selectedShiftNames.map(name => cloneDeep(globalShiftTemplates[name])).filter(Boolean);
      sched.holidayGroups = selectedHolidayNames.reduce((acc, name) => {
        if (globalHolidayGroupTemplates[name]) acc[name] = cloneDeep(globalHolidayGroupTemplates[name]);
        return acc;
      }, {});
      sched.attendanceGroups = selectedAttendanceNames.map(name => cloneDeep(globalAttendanceGroupTemplates[name])).filter(Boolean);
      const prevSelectedHolidayGroups = Array.isArray(sched.selectedHolidayGroups) ? sched.selectedHolidayGroups : [];
      sched.selectedHolidayGroups = prevSelectedHolidayGroups.filter(name => selectedHolidayNames.includes(name));
      if (!sched.selectedHolidayGroups.length && selectedHolidayNames.length) {
        sched.selectedHolidayGroups = [selectedHolidayNames[0]];
      }
      sched.allowedScopeCustomized = true;
      sched.allowedShiftNames = selectedShiftNames;
      sched.allowedHolidayGroupNames = selectedHolidayNames;
      sched.allowedAttendanceGroupNames = selectedAttendanceNames;
      schedules[currentScheduleIndex] = sched;
      G.schedules = schedules;
      localStorage.setItem('shiftMgmt:global', JSON.stringify(G));
    }
    window.location.href = getReturnUrl();
  }

  function goBackWithoutSave() {
    window.location.href = getReturnUrl();
  }

  window.setAllowedPickerActive = setAllowedPickerActive;
  window.renderAllowedPickerSection = renderAllowedPickerSection;
  window.moveAllowedToSelected = moveAllowedToSelected;
  window.moveAllowedToAvailable = moveAllowedToAvailable;
  window.selectAllAllowedAvailable = selectAllAllowedAvailable;
  window.goEditItem = goEditItem;
  window.goEditPage = goEditPage;
  window.setScopeBranchFilter = setScopeBranchFilter;
  window.setScopeDepartmentFilter = setScopeDepartmentFilter;
  window.setScopeKeywordFilter = setScopeKeywordFilter;
  window.saveAndBack = saveAndBack;
  window.goBackWithoutSave = goBackWithoutSave;

  renderScopeFilters();
  initAllowedPicker();
  </script>
 </body>
</html>
