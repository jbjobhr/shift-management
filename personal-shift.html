<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人排班</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    html, body { height: 100%; width: 100%; box-sizing: border-box; }
    .calendar-cell {
      min-height: 78px; border: 1px solid #e2e8f0; padding: 6px;
      font-size: 12px; vertical-align: top; background: #ffffff;
      cursor: pointer; transition: background 0.15s;
    }
    .calendar-cell:hover { background: #f1f5f9; }
    .calendar-cell.other-month { background: #f8fafc; color: #cbd5e1; cursor: default; }
    .calendar-cell.other-month:hover { background: #f8fafc; }
    .calendar-cell.out-of-range { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
    .calendar-cell.out-of-range:hover { background: #f1f5f9; }
    .calendar-cell.today { box-shadow: inset 0 0 0 2px #3b82f6; }
    .calendar-cell.holiday { background: #fef2f2; }
    .calendar-cell.holiday .date-num { color: #dc2626; font-weight: 600; }
    .shift-tag { display: block; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-top: 3px; text-align: center; }
    .shift-tag.work { background: #fef3c7; color: #b45309; }
    .shift-tag.work.ot { background: #ffedd5; color: #c2410c; border: 1px solid #fdba74; }
    .shift-tag.off { background: #fee2e2; color: #b91c1c; }
    .week-summary { font-size: 11px; color: #475569; padding: 4px 6px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px; text-align: center; }
    .week-summary.warn { background: #fff7ed; color: #c2410c; border-color: #fed7aa; font-weight: 600; }
    .tag-item { display: inline-flex; align-items: center; gap: 6px; background: #e0f2fe; color: #0369a1; padding: 4px 10px; border-radius: 4px; font-size: 13px; margin: 3px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 50; }
    input[type="date"], input[type="time"], input[type="text"], select { border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 10px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
  </style>
 </head>
 <body class="h-full bg-slate-50 w-full">
  <div id="app" class="h-full w-full flex flex-col overflow-auto">
   <header class="bg-[#1e3a5f] text-white px-6 py-4 flex items-center justify-between shrink-0">
    <h1 class="text-xl font-bold tracking-wide flex items-center gap-2">
     <i data-lucide="user-circle" class="w-5 h-5"></i><span id="pageTitle">個人排班</span>
    </h1>
    <nav class="flex gap-2">
     <button onclick="savePersonal()" class="px-4 py-1.5 rounded-md text-sm font-medium transition bg-blue-600 hover:bg-blue-700 flex items-center gap-2">
      <i data-lucide="save" class="w-4 h-4"></i>儲存
     </button>
      <button onclick="cancelPersonalChanges()" class="px-4 py-1.5 rounded-md text-sm font-medium transition bg-slate-200 hover:bg-slate-300 text-slate-700 flex items-center gap-2" title="回到未改動前（上次儲存）狀態">
       <i data-lucide="x-circle" class="w-4 h-4"></i>取消
      </button>
     <a href="index.html" class="px-4 py-1.5 rounded-md text-sm font-medium transition bg-transparent hover:bg-white/10 text-white flex items-center gap-2">
      <i data-lucide="arrow-left" class="w-4 h-4"></i>返回
     </a>
    </nav>
   </header>

   <main class="flex-1 overflow-auto p-6">
    <div class="max-w-6xl mx-auto space-y-6">

     <!-- 個人資訊 + 區間 -->
     <section class="bg-white rounded-xl shadow-sm p-5 space-y-4">
      <div class="flex items-center gap-3">
       <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-lg font-bold" id="empAvatar">?</div>
       <div class="flex-1">
        <div class="text-lg font-bold text-slate-800" id="empName">未指定員工</div>
        <div class="text-sm text-slate-500" id="empMeta">員工編號：-</div>
       </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
       <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">起始日期</label>
        <input type="date" id="rangeStart" class="w-full">
       </div>
       <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">結束日期</label>
        <input type="date" id="rangeEnd" class="w-full">
       </div>
       <div class="flex items-end gap-2">
        <button onclick="prevMonth()" class="px-3 py-2 bg-slate-100 hover:bg-slate-200 rounded-md text-sm flex items-center gap-1">
         <i data-lucide="chevron-left" class="w-4 h-4"></i>上月
        </button>
        <button onclick="nextMonth()" class="px-3 py-2 bg-slate-100 hover:bg-slate-200 rounded-md text-sm flex items-center gap-1">
         下月<i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>
        <button onclick="goToday()" class="px-3 py-2 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-md text-sm">今天</button>
       </div>
      </div>
     </section>

     <!-- 月曆 -->
     <section class="bg-white rounded-xl shadow-sm p-5">
      <div class="flex items-center justify-between mb-4">
       <h2 id="calendarTitle" class="font-bold text-lg text-slate-800"></h2>
       <div class="flex items-center gap-3 text-xs text-slate-600">
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-blue-200 inline-block"></span>已排班</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-red-200 inline-block"></span>休假/節假日</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded border-2 border-blue-500 inline-block"></span>今天</span>
       </div>
      </div>
      <table class="w-full border-collapse table-fixed">
       <thead>
        <tr class="bg-slate-100 text-slate-600 text-sm">
         <th class="p-2 border border-slate-200">一</th>
         <th class="p-2 border border-slate-200">二</th>
         <th class="p-2 border border-slate-200">三</th>
         <th class="p-2 border border-slate-200">四</th>
         <th class="p-2 border border-slate-200">五</th>
         <th class="p-2 border border-slate-200">六</th>
         <th class="p-2 border border-slate-200">日</th>
         <th class="p-2 border border-slate-200 w-20">週合計</th>
        </tr>
       </thead>
       <tbody id="calendarBody"></tbody>
      </table>
      <p class="text-xs text-slate-500 mt-3 flex items-center gap-1">
       <i data-lucide="info" class="w-3.5 h-3.5"></i>
       點擊區間內的日期可指派班別／休假，再次點擊可清除。
      </p>
     </section>

     <!-- 個人化指派：假別組/考勤組/班別/崗位/標籤 -->
     <div class="flex items-center justify-between">
      <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2">
       <i data-lucide="settings" class="w-5 h-5 text-slate-500"></i>個人化指派
      </h2>
      <div class="flex items-center gap-3">
       <span id="applyDirtyHint" class="text-xs text-amber-600 hidden">有未套用的變更</span>
      <button onclick="applyPersonalSettings('keep')" class="px-4 py-2 bg-white border border-[#1e3a5f] text-[#1e3a5f] rounded-lg text-sm font-medium hover:bg-slate-100 transition flex items-center gap-1" title="保留原本班表，並將新班別 append 到既有班別（不重複）">
        <i data-lucide="plus" class="w-4 h-4"></i>保留並套用
       </button>
       <button onclick="applyPersonalSettings('clear')" class="px-4 py-2 bg-[#1e3a5f] text-white rounded-lg text-sm font-medium hover:bg-[#2a4f7f] transition flex items-center gap-1" title="清除區間內原有的指派並重新套用">
        <i data-lucide="refresh-cw" class="w-4 h-4"></i>清除並套用
       </button>
      </div>
     </div>
     <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- 假別組 -->
      <section class="bg-white rounded-xl shadow-sm p-5 space-y-3">
       <h2 class="font-bold text-lg text-slate-800 flex items-center gap-2">
        <i data-lucide="calendar-off" class="w-5 h-5 text-red-500"></i>套用假別組
       </h2>
       <div id="personalHolidayGroups" class="space-y-2"></div>
      </section>

      <!-- 考勤組 -->
      <section class="bg-white rounded-xl shadow-sm p-5 space-y-3">
       <h2 class="font-bold text-lg text-slate-800 flex items-center gap-2">
        <i data-lucide="users" class="w-5 h-5 text-green-600"></i>套用考勤組
        <span class="text-xs font-normal text-slate-400 ml-1">（一次性套用週排班規則）</span>
       </h2>
       <p class="text-xs text-slate-500 flex items-start gap-1">
        <i data-lucide="info" class="w-3.5 h-3.5 mt-0.5 shrink-0"></i>
        <span>此選擇僅用於本次套用，不影響班表設定中的考勤組成員歸屬。</b></span>
       </p>
       <div id="personalAttendanceGroups" class="space-y-2"></div>
      </section>

      <!-- 班別 -->
      <section class="bg-white rounded-xl shadow-sm p-5 space-y-3 hidden">
       <h2 class="font-bold text-lg text-slate-800 flex items-center gap-2">
        <i data-lucide="clock" class="w-5 h-5 text-amber-600"></i>可排班別
       </h2>
       <div id="personalShifts" class="space-y-2"></div>
      </section>

      <!-- 崗位 -->
      <section class="bg-white rounded-xl shadow-sm p-5 space-y-3">
       <h2 class="font-bold text-lg text-slate-800 flex items-center gap-2">
        <i data-lucide="briefcase" class="w-5 h-5 text-teal-600"></i>崗位
       </h2>
       <select id="personalPositionSelect" class="w-full" onchange="addPersonalPosition()">
        <option value="">-- 選擇崗位 --</option>
       </select>
       <div id="personalPositionList" class="flex flex-wrap"></div>
      </section>

      <!-- 標籤 -->
      <section class="bg-white rounded-xl shadow-sm p-5 space-y-3 md:col-span-2">
       <h2 class="font-bold text-lg text-slate-800 flex items-center gap-2">
        <i data-lucide="tag" class="w-5 h-5 text-teal-600"></i>標籤
       </h2>
       <div class="flex gap-2">
        <input type="text" id="personalTagInput" placeholder="搜尋或輸入新標籤" class="flex-1 max-w-sm">
        <button onclick="addPersonalTag()" class="px-3 py-1.5 bg-teal-50 text-teal-700 rounded-md text-sm font-medium hover:bg-teal-100 transition">新增</button>
       </div>
       <div id="personalTagList" class="flex flex-wrap"></div>
      </section>
     </div>

    </div>
   </main>
  </div>

  <!-- 指派班別 modal -->
  <div id="assignModal" class="modal-overlay hidden">
   <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm space-y-4">
    <h3 class="font-bold text-lg flex items-center gap-2">
     <i data-lucide="calendar-check" class="w-5 h-5 text-blue-600"></i>
     指派班別 <span id="assignDateLabel" class="text-sm text-slate-500 font-normal"></span>
    </h3>
    <div>
     <label class="block text-sm font-medium text-slate-600 mb-2">選擇班別</label>
     <div id="assignShiftOptions" class="space-y-2 max-h-60 overflow-y-auto"></div>
    </div>
    <div class="flex justify-between items-center pt-2 border-t">
     <button onclick="clearAssignment()" class="px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-md flex items-center gap-1">
      <i data-lucide="trash-2" class="w-4 h-4"></i>清除
     </button>
     <div class="flex gap-2">
      <button onclick="closeAssignModal()" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-md">取消</button>
     </div>
    </div>
   </div>
  </div>

  <script>
  function _genWeekendsOfYear(year) {
    const out = [], d = new Date(year, 0, 1);
    while (d.getFullYear() === year) {
      const w = d.getDay();
      if (w === 0 || w === 6) out.push(`${year}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
      d.setDate(d.getDate() + 1);
    }
    return out;
  }
  // ===== 全域資料：自 localStorage 載入（由 index.html 同步） =====
  const FALLBACK = {
    persons: [
      { name: '王小明', id: 'EMP001' },
      { name: '李小華', id: 'EMP002' },
      { name: '張大偉', id: 'EMP003' },
      { name: '陳美玲', id: 'EMP004' },
      { name: '林志豪', id: 'EMP005' }
    ],
    supervisors: [],
    shifts: [
      { name: '早班', shortName: '早', start: '08:00', end: '17:00', hours: 8, rest: 1 },
      { name: '午班', shortName: '午', start: '13:00', end: '17:00', hours: 4 },
      { name: '晚班', shortName: '晚', start: '18:00', end: '22:00', hours: 4 }
    ],
    holidayGroups: {
      '台灣國定假日': [
        // 元旦
        '2026-01-01', '2026-01-02',
        // 春節 (2/14–2/22)
        '2026-02-14', '2026-02-15', '2026-02-16', '2026-02-17', '2026-02-18', '2026-02-19', '2026-02-20', '2026-02-21', '2026-02-22',
        // 和平紀念日 (2/27補假、2/28、3/1)
        '2026-02-27', '2026-02-28', '2026-03-01',
        // 兒童節／清明節 (4/3補假、4/4、4/5、4/6補假)
        '2026-04-03', '2026-04-04', '2026-04-05', '2026-04-06',
        // 勞動節
        '2026-05-01',
        // 端午節
        '2026-06-19',
        // 中秋節／教師節 (9/25–9/28)
        '2026-09-25', '2026-09-26', '2026-09-27', '2026-09-28',
        // 國慶日 (10/9補假、10/10、10/11)
        '2026-10-09', '2026-10-10', '2026-10-11',
        // 行憲紀念日 (12/25–12/27)
        '2026-12-25', '2026-12-26', '2026-12-27'
      ],
      '一例一休': _genWeekendsOfYear(2026),
      '自訂假別B': ['2026-03-01', '2026-03-15']
    },
    individualHolidays: [],
    attendanceGroups: [
      { name: 'A組 - 倉儲', members: ['EMP001', 'EMP002'], scheduleType: 'auto',
        weekdayShifts: { mon:['早班'], tue:['早班'], wed:['早班'], thu:['早班'], fri:['早班'], sat:[], sun:[] } },
      { name: 'B組 - 物流', members: ['EMP003'], scheduleType: 'auto', workOnHoliday: true,
        weekdayShifts: { mon:['早班'], tue:['早班'], wed:[], thu:['早班'], fri:[], sat:['午班','晚班'], sun:['午班','晚班'] } },
      { name: 'C組 - 客服', members: ['EMP004', 'EMP005'], scheduleType: 'auto',
        weekdayShifts: { mon:['早班'], tue:['午班','晚班'], wed:['早班'], thu:['午班','晚班'], fri:['早班'], sat:[], sun:[] } }
    ],
    allPositions: ['揀貨員','包裝員','理貨員','搬運工','品檢員','分類員','叉車手','司機'],
    positions: ['理貨員','包裝員'],
    tags: ['可加班','新人','夜班優先'],
    schedules: []
  };
  let G = FALLBACK;
  const DATA_VERSION = 13;
  try {
    const raw = localStorage.getItem('shiftMgmt:global');
    if (raw) {
      const stored = JSON.parse(raw);
      G = Object.assign({}, FALLBACK, stored);
      if ((stored.__version || 0) < DATA_VERSION) {
        G.attendanceGroups = FALLBACK.attendanceGroups;
        G.holidayGroups = FALLBACK.holidayGroups;
        G.shifts = FALLBACK.shifts;
        G.__version = DATA_VERSION;
        try { localStorage.setItem('shiftMgmt:global', JSON.stringify(G)); } catch(e){}
      }
    }
  } catch (e) { console.warn('load global failed', e); }

  // ===== 取得目前員工 =====
  const params = new URLSearchParams(location.search);
  const empId = params.get('empId') || '';
  const employee = G.persons.find(p => p.id === empId) || { name: '(未指定)', id: empId || '-' };

  // ===== 個人配置：自 localStorage 載入 =====
  const PKEY = `shiftMgmt:personal:${empId || '_anon'}`;
  let personal = {
    rangeStart: '',
    rangeEnd: '',
    assignments: {},   // { 'YYYY-MM-DD': { type:'work'|'off', shiftName? } }
    holidayGroups: [], // 適用的假別組名稱
    attendanceGroups: [],
    shifts: [],        // 可排班別名稱
    positions: [],
    tags: []
  };
  try {
    const raw = localStorage.getItem(PKEY);
    if (raw) personal = Object.assign(personal, JSON.parse(raw));
  } catch (e) { console.warn('load personal failed', e); }

  // 草稿：使用者選取後需點「Apply」才套用到 personal / localStorage
  let draft = {
    holidayGroups: [...personal.holidayGroups],
    attendanceGroups: [...personal.attendanceGroups],
    shifts: [...personal.shifts],
    positions: [...personal.positions]
  };
  let savedSnapshot = null;
  function setDirty(flag){
    const el = document.getElementById('applyDirtyHint');
    if (el) el.classList.toggle('hidden', !flag);
  }

  // 預設區間：當前月份
  const today = new Date();
  if (!personal.rangeStart) personal.rangeStart = fmt(new Date(today.getFullYear(), today.getMonth(), 1));
  if (!personal.rangeEnd)   personal.rangeEnd   = fmt(new Date(today.getFullYear(), today.getMonth()+1, 0));

  let viewMonth = new Date(personal.rangeStart);
  viewMonth.setDate(1);

  // ===== 工具 =====
  function pad(n){ return String(n).padStart(2,'0'); }
  function fmt(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
  function parseDate(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
  function deepClone(v){ return JSON.parse(JSON.stringify(v)); }
  function commitSnapshot(){
    savedSnapshot = {
      personal: deepClone(personal),
      draft: deepClone(draft),
      viewMonth: fmt(viewMonth)
    };
  }
  function hasSnapshotChanges(){
    if (!savedSnapshot) return false;
    return JSON.stringify(personal) !== JSON.stringify(savedSnapshot.personal)
      || JSON.stringify(draft) !== JSON.stringify(savedSnapshot.draft)
      || fmt(viewMonth) !== savedSnapshot.viewMonth;
  }
  function isHolidayDate(dateStr, dow){
    if (dow === 0 || dow === 6) return true;
    if ((G.individualHolidays||[]).includes(dateStr)) return true;
    for (const grp of personal.holidayGroups) {
      const dates = (G.holidayGroups||{})[grp] || [];
      if (dates.includes(dateStr)) return true;
    }
    return false;
  }

  // ===== 渲染：頂部資訊 =====
  function renderHeader(){
    document.getElementById('pageTitle').textContent = `個人排班 - ${employee.name}`;
    document.getElementById('empName').textContent = employee.name;
    document.getElementById('empMeta').textContent = `員工編號：${employee.id}`;
    document.getElementById('empAvatar').textContent = (employee.name||'?').charAt(0);
    document.getElementById('rangeStart').value = personal.rangeStart;
    document.getElementById('rangeEnd').value = personal.rangeEnd;
  }

  // ===== 渲染：月曆 =====
  const MAX_WEEKLY_HOURS_PERSONAL = 40;
  function getShiftHoursByName(name) {
    const s = (G.shifts || []).find(x => x.name === name);
    return s ? (Number(s.hours) || 0) : 0;
  }
  // 以 ISO 週為單位（週一為週首）計算累計工時，依排序順序逐班標記是否已超過 40h
  function buildWeeklyOtMap() {
    // key: ISO weekKey "YYYY-Www" -> { totalSoFar, otByDate: { date: [boolFlags per shift] } }
    const dates = Object.keys(personal.assignments || {}).sort();
    const weekTotal = {}; // weekKey -> hours so far
    const otFlags = {};   // dateStr -> array<bool> aligning shiftNames order
    const dateWeekly = {};// dateStr -> { weekKey, weeklyAfter }
    function isoWeekKey(d) {
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dayNum = date.getUTCDay() || 7;
      date.setUTCDate(date.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
      return `${date.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`;
    }
    dates.forEach(ds => {
      const a = personal.assignments[ds];
      if (!a || a.type !== 'work') return;
      const names = a.shiftNames || (a.shiftName ? [a.shiftName] : []);
      const [y,m,d] = ds.split('-').map(Number);
      const wk = isoWeekKey(new Date(y, m-1, d));
      if (!(wk in weekTotal)) weekTotal[wk] = 0;
      const flags = [];
      names.forEach(n => {
        const h = getShiftHoursByName(n);
        const before = weekTotal[wk];
        const after = before + h;
        flags.push(after > MAX_WEEKLY_HOURS_PERSONAL); // 整班是否超過上限
        weekTotal[wk] = after;
      });
      otFlags[ds] = flags;
      dateWeekly[ds] = { weekKey: wk, weeklyAfter: weekTotal[wk] };
    });
    return { weekTotal, otFlags, dateWeekly, isoWeekKey };
  }

  function renderCalendar(){
    const year = viewMonth.getFullYear();
    const month = viewMonth.getMonth();
    document.getElementById('calendarTitle').textContent = `${year} 年 ${month+1} 月`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const todayStr = fmt(new Date());
    const rs = personal.rangeStart, re = personal.rangeEnd;

    // 週一為首：計算首日之前需填充几天（Sun=0 -> 6，Mon=1 -> 0）
    const leadDays = (firstDay + 6) % 7;
    const cells = [];
    const prevMonthDays = new Date(year, month, 0).getDate();
    for (let i = leadDays-1; i >= 0; i--) cells.push({ date: new Date(year, month-1, prevMonthDays-i), other: true });
    for (let i = 1; i <= daysInMonth; i++) cells.push({ date: new Date(year, month, i), other: false });
    let extra = 1;
    while (cells.length % 7 !== 0 || cells.length < 35) cells.push({ date: new Date(year, month+1, extra++), other: true });

    const tbody = document.getElementById('calendarBody');
    tbody.innerHTML = '';

    const otMap = buildWeeklyOtMap();

    for (let r = 0; r < cells.length/7; r++){
      const tr = document.createElement('tr');
      let weekHours = 0;
      let weekHasOt = false;
      for (let c = 0; c < 7; c++){
        const cell = cells[r*7+c];
        const td = document.createElement('td');
        td.className = 'calendar-cell';
        const ds = fmt(cell.date);
        const dow = cell.date.getDay();
        const inRange = (!rs || ds >= rs) && (!re || ds <= re);

        if (cell.other) td.classList.add('other-month');
        else if (!inRange) td.classList.add('out-of-range');

        if (!cell.other && isHolidayDate(ds, dow)) td.classList.add('holiday');
        if (ds === todayStr) td.classList.add('today');

        const a = personal.assignments[ds];
        let body = '';
        if (a){
          if (a.type === 'off') body = `<div class="shift-tag off">休</div>`;
          else if (a.type === 'work') {
            const names = a.shiftNames || (a.shiftName ? [a.shiftName] : []);
            const flags = otMap.otFlags[ds] || [];
            body = names.length
              ? names.map((n, i) => {
                  const isOt = flags[i];
                  if (!cell.other) {
                    weekHours += getShiftHoursByName(n);
                    if (isOt) weekHasOt = true;
                  }
                  return `<div class="shift-tag work${isOt ? ' ot' : ''}" title="${isOt ? '\u5df2\u8d85\u904e\u6bcf\u9031 40h\uff0c\u8a72\u73ed\u6b21\u8a08\u52a0\u73ed' : ''}">${n}${isOt ? ' \u52a0' : ''}</div>`;
                }).join('')
              : `<div class="shift-tag work">已排</div>`;
          }
        }
        td.innerHTML = `<div class="date-num text-right text-slate-700">${cell.date.getDate()}</div>${body}`;

        if (!cell.other && inRange) {
          td.addEventListener('click', () => openAssignModal(ds));
        }
        tr.appendChild(td);
      }
      // 週合計欄
      const sumTd = document.createElement('td');
      sumTd.className = 'calendar-cell';
      sumTd.style.cursor = 'default';
      const cls = (weekHours > MAX_WEEKLY_HOURS_PERSONAL || weekHasOt) ? 'week-summary warn' : 'week-summary';
      const otText = weekHours > MAX_WEEKLY_HOURS_PERSONAL ? `<div class="text-[10px]">含加班 ${(weekHours - MAX_WEEKLY_HOURS_PERSONAL)}h</div>` : '';
      sumTd.innerHTML = `<div class="${cls}">${weekHours}h${otText}</div>`;
      tr.appendChild(sumTd);
      tbody.appendChild(tr);
    }
    lucide.createIcons();
  }

  function checkWeeklyOverLimit(dateStr, newShiftNames) {
    if (!newShiftNames || !newShiftNames.length) return null;
    function isoWeekKey(d) {
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dayNum = date.getUTCDay() || 7;
      date.setUTCDate(date.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
      return `${date.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`;
    }
    const [y,m,d] = dateStr.split('-').map(Number);
    const targetWk = isoWeekKey(new Date(y, m-1, d));
    let total = 0;
    Object.keys(personal.assignments || {}).forEach(ds => {
      if (ds === dateStr) return; // 本日以新設為準
      const a = personal.assignments[ds];
      if (!a || a.type !== 'work') return;
      const [yy,mm,dd] = ds.split('-').map(Number);
      if (isoWeekKey(new Date(yy, mm-1, dd)) !== targetWk) return;
      const names = a.shiftNames || (a.shiftName ? [a.shiftName] : []);
      names.forEach(n => { total += getShiftHoursByName(n); });
    });
    newShiftNames.forEach(n => { total += getShiftHoursByName(n); });
    return total > MAX_WEEKLY_HOURS_PERSONAL ? total : null;
  }

  // 依目前設定，將區間內每一天填入班別或休假
  // mode: 'clear' 覆寫所有日期；'keep' 保留既有資料並 append 新班別
  function autoFillAssignments(mode){
    if (mode !== 'keep') mode = 'clear';
    const rs = personal.rangeStart, re = personal.rangeEnd;
    if (!rs || !re) return;
    const shiftNames = personal.shifts.length ? [...personal.shifts] : [];
    // 若有選考勤組，優先採用考勤組的週一～週日排班（自動排班型態）
    const DOW_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
    const groupWeekday = {};
    let useGroup = false;
    (personal.attendanceGroups || []).forEach(name => {
      const g = (G.attendanceGroups || []).find(x => x.name === name);
      if (!g || g.scheduleType === 'manual') return;
      useGroup = true;
      // 若考勤組未設定，套用預設：週一到五為第一個班別
      let ws = g.weekdayShifts;
      if (!ws) {
        const first = (G.shifts && G.shifts[0] && G.shifts[0].name) ? [G.shifts[0].name] : [];
        ws = { mon: first, tue: first, wed: first, thu: first, fri: first, sat: [], sun: [] };
      }
      DOW_KEYS.forEach(k => {
        const v = ws[k];
        const arr = Array.isArray(v) ? v : (typeof v === 'string' && v ? [v] : []);
        if (!groupWeekday[k]) groupWeekday[k] = [];
        arr.forEach(n => { if (!groupWeekday[k].includes(n)) groupWeekday[k].push(n); });
      });
    });

    // 假別組指定的日期（不含週末預設）
    function isExplicitHoliday(dateStr){
      if ((G.individualHolidays||[]).includes(dateStr)) return true;
      for (const grp of personal.holidayGroups) {
        const dates = (G.holidayGroups||{})[grp] || [];
        if (dates.includes(dateStr)) return true;
      }
      return false;
    }

    const start = parseDate(rs), end = parseDate(re);
    for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
      const ds = fmt(d);
      const dow = d.getDay();
      const existing = personal.assignments[ds];
      // 假別組明確列出的日期 → 一定休
      if (isExplicitHoliday(ds)) {
        if (mode === 'keep' && existing) continue;
        personal.assignments[ds] = { type: 'off' };
        continue;
      }
      let dayShifts;
      if (useGroup) {
        // 採用考勤組的設定（即使週末，只要有排班就排）
        dayShifts = groupWeekday[DOW_KEYS[dow]] || [];
      } else {
        // 沒選考勤組：若也沒選班別，只處理假別組明確列出的日期，其餘清空
        if (!shiftNames.length) {
          delete personal.assignments[ds];
          continue;
        }
        // 有班別：週末預設休，平日排班
        if (dow === 0 || dow === 6) {
          if (mode === 'keep' && existing) continue;
          personal.assignments[ds] = { type: 'off' }; continue;
        }
        dayShifts = shiftNames;
      }
      if (mode === 'keep' && existing) {
        if (existing.type === 'work' && dayShifts.length) {
          const merged = [...(existing.shiftNames || [])];
          dayShifts.forEach(s => { if (!merged.includes(s)) merged.push(s); });
          personal.assignments[ds] = { type: 'work', shiftNames: merged };
        }
        continue;
      }

      if (dayShifts.length) {
        personal.assignments[ds] = { type: 'work', shiftNames: [...dayShifts] };
      } else if (mode !== 'keep') {
        // keep 模式不強制把無班別的日期設為休假
        personal.assignments[ds] = { type: 'off' };
      }
    }
  }
