<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>派遣排班系統</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    html, body { height: 100%; width: 100%; }
    .tab-active { background: #e2e8f0; color: #1e3a5f; }
    .tab-inactive { background: transparent; color: #ffffff; }
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 9999px; font-size: 12px; }
    .calendar-cell { min-width: 50px; min-height: 40px; border: 1px solid #e2e8f0; text-align: center; font-size: 12px; padding: 4px; }
    /* ── 色彩語義 Token（與 personal-shift.html 共用） ────────────
       考勤組排班 : bg #dcfce7 / text #166534  (.assigned)
       個人排班 : bg #dbeafe / text #1e40af  (.personal)
       加班     : bg #ffedd5 / text #c2410c  (.holiday-ot)
       休假     : bg #fef2f2 / text #dc2626  (.holiday)
    ── ─────────────────────────────────────────────────────── */
    .calendar-cell.holiday  { background: #fef2f2; color: #dc2626; }                  /* 休假 */
    .calendar-cell.assigned { background: #dcfce7; color: #166534; font-weight: 500; } /* 考勤組 */
    .calendar-cell.holiday-ot { background: #ffedd5; color: #c2410c; font-weight: 600; border-color: #fdba74; } /* 加班 */
    /* 個人排班標記：左側紫框；上班時覆蓋藍底，個人手動指派休假時也呈藍底（對齊 personal-shift）*/
    .calendar-cell.personal.assigned { background: #dbeafe !important; color: #1e40af !important; }
    .calendar-cell.personal.holiday { background: #dbeafe !important; color: #1e40af !important; }
    .calendar-cell.today { box-shadow: inset 0 0 0 2px #3b82f6; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .tag-item { display: inline-flex; align-items: center; gap: 6px; background: #e0f2fe; color: #0369a1; padding: 4px 10px; border-radius: 4px; font-size: 13px; margin: 3px; }
    input[type="date"], input[type="time"], input[type="text"], select { border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 10px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full bg-slate-50 w-full">
  <div id="app" class="h-full w-full flex flex-col overflow-auto">
   <header class="bg-[#1e3a5f] text-white px-6 py-4 flex items-center justify-between shrink-0">
    <h1 id="appTitle" class="text-xl font-bold tracking-wide">班表總覽</h1>
    <div class="flex gap-2">
     <a href="index.html" class="px-4 py-1.5 rounded-md text-sm font-medium transition tab-active">班表總覽</a>
    <a href="shift-list.html" class="px-4 py-1.5 rounded-md text-sm font-medium transition tab-inactive">班表設定</a>
    </div>
   </header>
   <div id="pageSchedule" class="flex-1 overflow-auto p-6">
    <div class="w-full space-y-4">
     <div class="bg-white rounded-xl shadow-sm p-4 space-y-3">
      <div class="flex items-center justify-between border-b border-slate-200 pb-3 mb-3">
       <div class="flex flex-wrap items-center gap-3">
        <h2 class="text-lg font-bold text-slate-800" id="schedulePageTitle">2026年1月排班</h2><span id="scheduleDateRange" class="text-xs text-slate-500"></span><button onclick="toggleScheduleList()" class="text-xs px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-slate-600 transition">切換班表</button>
        <div class="relative"><button onclick="toggleFilterDropdown('branchFilter')" class="text-xs px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-slate-600 transition">分公司/分店/案場</button>
         <div id="branchFilter" class="hidden absolute top-full left-0 bg-white border border-slate-300 rounded-md shadow-lg mt-1 min-w-[220px] z-30">
          <div id="branchFilterList" class="p-2 space-y-1"></div>
         </div>
        </div>
        <div class="relative"><button onclick="toggleFilterDropdown('departmentFilter')" class="text-xs px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-slate-600 transition">部門/工作地</button>
         <div id="departmentFilter" class="hidden absolute top-full left-0 bg-white border border-slate-300 rounded-md shadow-lg mt-1 min-w-[220px] z-30">
          <div id="departmentFilterList" class="p-2 space-y-1"></div>
         </div>
        </div>
       </div>
       <div id="scheduleListDropdown" class="hidden absolute top-20 left-6 bg-white border border-slate-300 rounded-lg shadow-lg z-30 min-w-[200px]">
        <div class="p-2 space-y-1" id="scheduleListContainer"></div>
       </div>
      </div>
     </div>
     <div class="bg-white rounded-xl shadow-sm p-4 space-y-3">
      <div class="flex flex-wrap gap-4">
       <div class="relative"><label class="block text-xs font-medium text-slate-500 mb-2">崗位</label> <button onclick="toggleFilterDropdown('positionFilter')" class="text-sm border border-slate-300 rounded-md px-3 py-1.5 bg-white hover:bg-slate-50">▼ 選擇崗位</button>
        <div id="positionFilter" class="hidden absolute top-full left-0 bg-white border border-slate-300 rounded-md shadow-lg mt-1 min-w-[180px] z-20">
         <div id="positionFilterList" class="p-2 space-y-1"></div>
        </div>
       </div>
       <div class="relative"><label class="block text-xs font-medium text-slate-500 mb-2">班別</label> <button onclick="toggleFilterDropdown('shiftFilter')" class="text-sm border border-slate-300 rounded-md px-3 py-1.5 bg-white hover:bg-slate-50">▼ 選擇班別</button>
        <div id="shiftFilter" class="hidden absolute top-full left-0 bg-white border border-slate-300 rounded-md shadow-lg mt-1 min-w-[180px] z-20">
         <div id="shiftFilterList" class="p-2 space-y-1"></div>
        </div>
       </div>
       <div class="relative"><label class="block text-xs font-medium text-slate-500 mb-2">節假日</label> <button onclick="toggleFilterDropdown('holidayFilter')" class="text-sm border border-slate-300 rounded-md px-3 py-1.5 bg-white hover:bg-slate-50">▼ 選擇假別</button>
        <div id="holidayFilter" class="hidden absolute top-full left-0 bg-white border border-slate-300 rounded-md shadow-lg mt-1 min-w-[200px] z-20 max-h-64 overflow-y-auto">
         <div id="holidayGroupFilterList" class="p-2 space-y-1 border-b border-slate-200"></div>
         <div id="holidayDateFilterList" class="p-2 space-y-1"></div>
        </div>
       </div>
       <div class="relative"><label class="block text-xs font-medium text-slate-500 mb-2">考勤組</label> <button onclick="toggleFilterDropdown('groupFilter')" class="text-sm border border-slate-300 rounded-md px-3 py-1.5 bg-white hover:bg-slate-50">▼ 選擇考勤組</button>
        <div id="groupFilter" class="hidden absolute top-full left-0 bg-white border border-slate-300 rounded-md shadow-lg mt-1 min-w-[180px] z-20">
         <div id="groupFilterList" class="p-2 space-y-1"></div>
        </div>
       </div>
       <div class="relative"><label class="block text-xs font-medium text-slate-500 mb-2">標籤</label> <button onclick="toggleFilterDropdown('tagFilter')" class="text-sm border border-slate-300 rounded-md px-3 py-1.5 bg-white hover:bg-slate-50">▼ 選擇標籤</button>
        <div id="tagFilter" class="hidden absolute top-full left-0 bg-white border border-slate-300 rounded-md shadow-lg mt-1 min-w-[180px] z-20">
         <div id="tagFilterList" class="p-2 space-y-1"></div>
        </div>
       </div>
      </div>
      <div class="pt-3 border-t border-slate-200">
       <div class="text-xs font-medium text-slate-600 mb-2">
        已選篩選條件
       </div>
       <div class="flex flex-wrap gap-2" id="activeFilters"><span class="text-xs text-slate-500">尚未選擇</span>
       </div>
      </div>
      <div><label class="block text-xs font-medium text-slate-500 mb-1">搜尋</label><input type="text" id="searchInput" placeholder="姓名、員工編號或身份證" class="text-sm w-full max-w-xs" oninput="applyScheduleFilters()">
      </div>
     </div>
     <div class="bg-white rounded-xl shadow-sm p-4">
      <div class="flex items-center justify-between gap-4 flex-wrap">
       <div class="flex items-center gap-2 flex-wrap">
        <span class="text-sm font-medium text-slate-700 flex items-center gap-1"><i data-lucide="eye" class="w-4 h-4 text-purple-600"></i>檢視人員（主管）：</span>
        <div id="supervisorChips" class="flex flex-wrap gap-2"></div>
       </div>
      <div id="scheduleSummary" class="flex items-center justify-end gap-2 flex-wrap">
       <div class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5">
        <div class="text-[11px] text-slate-500">總人數</div>
        <div class="text-base font-semibold text-slate-800">0 人</div>
       </div>
       <div class="bg-blue-50 border border-blue-100 rounded-lg px-3 py-1.5">
        <div class="text-[11px] text-blue-600">總工時</div>
        <div class="text-base font-semibold text-blue-700">0 h</div>
       </div>
       <div class="bg-emerald-50 border border-emerald-100 rounded-lg px-3 py-1.5">
        <div class="text-[11px] text-emerald-600">平均工時</div>
        <div class="text-base font-semibold text-emerald-700">0 h</div>
       </div>
      </div>
      </div>
     </div>
     <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
       <table class="w-full text-sm" id="scheduleTable">
        <thead id="scheduleHead"></thead>
        <tbody id="scheduleBody"></tbody>
       </table>
      </div>
        <div class="px-4 py-3 border-t border-slate-100 flex items-center justify-end gap-2">
         <button onclick="schedulePrevMonth()" class="text-xs px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-slate-600 transition">‹ 上月</button>
         <button onclick="scheduleNextMonth()" class="text-xs px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-slate-600 transition">下月 ›</button>
         <button onclick="scheduleGoToday()" class="text-xs px-2 py-1 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded transition">今天</button>
        </div>
     </div>
    </div>
   </div>
  </div>
  <div id="legendBar" class="shrink-0 px-6 py-2 bg-white border-t border-slate-200 flex flex-wrap items-center gap-2 text-xs text-slate-500">
   <span class="font-medium text-slate-600">圖例：</span>
   <span class="inline-block px-2 py-0.5 rounded" style="background:#dcfce7;color:#166534">班表排班</span>
    <span class="inline-block px-2 py-0.5 rounded" style="background:#dbeafe;color:#1e40af">個人排班</span>
   <span class="inline-block px-2 py-0.5 rounded" style="background:#fef2f2;color:#dc2626;font-weight:600">休假</span>
    <span class="inline-block px-2 py-0.5 rounded" style="background:#ffedd5;color:#c2410c;border:1px solid #fdba74">加班</span>
    <div class="w-full flex flex-wrap items-center gap-1 text-[11px] mt-1">
     <span class="font-medium text-slate-600 mr-1">優先級順序</span>
     <span class="px-2 py-0.5 rounded bg-emerald-50 text-emerald-700 border border-emerald-100">班表考勤組 (基底)</span>
     <span class="text-slate-400">→</span>
     <span class="px-2 py-0.5 rounded bg-rose-50 text-rose-700 border border-rose-100">班表假別組</span>
     <span class="text-slate-400">→</span>
     <span class="px-2 py-0.5 rounded bg-sky-50 text-sky-700 border border-sky-100">個人考勤組</span>
     <span class="text-slate-400">→</span>
     <span class="px-2 py-0.5 rounded bg-indigo-50 text-indigo-700 border border-indigo-100">個人假別組</span>
    </div>
  </div>
  <div id="newScheduleModal" class="modal-overlay hidden">
   <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md space-y-4">
    <h3 class="font-bold text-lg">新增班表</h3>
    <div><label class="block text-sm font-medium text-slate-600 mb-1">班表名稱</label><input type="text" id="newScheduleName" placeholder="如：2026年2月排班" class="w-full">
    </div>
    <div><label class="block text-sm font-medium text-slate-600 mb-1">起始日期</label><input type="date" id="newScheduleStart" class="w-full">
    </div>
    <div><label class="block text-sm font-medium text-slate-600 mb-1">結束日期</label><input type="date" id="newScheduleEnd" class="w-full">
    </div>
    <div class="flex justify-end gap-2 pt-2">
     <button onclick="closeNewScheduleModal()" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-md">取消</button> <button onclick="confirmNewSchedule()" class="px-4 py-2 text-sm bg-[#1e3a5f] text-white rounded-md hover:bg-[#2a4f7f]">確認</button>
    </div>
   </div>
  </div>
  <script>
  // ===== 從 localStorage 載入全域資料（由 shift-setting.html 寫入） =====
  function _genWeekendsOfYear(year) {
    const out = [];
    const d = new Date(year, 0, 1);
    while (d.getFullYear() === year) {
      const w = d.getDay();
      if (w === 0 || w === 6) {
        out.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
      }
      d.setDate(d.getDate() + 1);
    }
    return out;
  }
  const FALLBACK = {
    holidayGroups: {
      '台灣國定假日': [
        // 元旦
        '2026-01-01', '2026-01-02',
        // 春節 (2/14–2/22)
        '2026-02-14', '2026-02-15', '2026-02-16', '2026-02-17', '2026-02-18', '2026-02-19', '2026-02-20', '2026-02-21', '2026-02-22',
        // 和平紀念日 (2/27補假、2/28、3/1)
        '2026-02-27', '2026-02-28', '2026-03-01',
        // 兒童節／清明節 (4/3補假、4/4、4/5、4/6補假)
        '2026-04-03', '2026-04-04', '2026-04-05', '2026-04-06',
        // 勞動節
        '2026-05-01',
        // 端午節
        '2026-06-19',
        // 中秋節／教師節 (9/25–9/28)
        '2026-09-25', '2026-09-26', '2026-09-27', '2026-09-28',
        // 國慶日 (10/9補假、10/10、10/11)
        '2026-10-09', '2026-10-10', '2026-10-11',
        // 行憲紀念日 (12/25–12/27)
        '2026-12-25', '2026-12-26', '2026-12-27'
      ],
      '一例一休': _genWeekendsOfYear(2026),
      '自訂假別B': ['2026-03-01', '2026-03-15']
    },
    individualHolidays: ['2026-01-20', '2026-02-20'],
    persons: [
      { name: '王小明', id: 'EMP001' },
      { name: '李小華', id: 'EMP002' },
      { name: '張大偉', id: 'EMP003' },
      { name: '陳美玲', id: 'EMP004' },
      { name: '林志豪', id: 'EMP005' }
    ],
    supervisors: ['劉經理'],
    shifts: [
      { name: '早班', shortName: '早', start: '08:00', end: '17:00', hours: 8, rest: 1 },
      { name: '午班', shortName: '午', start: '13:00', end: '17:00', hours: 4 },
      { name: '晚班', shortName: '晚', start: '18:00', end: '22:00', hours: 4 }
    ],
    attendanceGroups: [
      { name: 'A組 - 倉儲', members: ['EMP001', 'EMP002'], scheduleType: 'auto',
        weekdayShifts: { mon:['早班'], tue:['早班'], wed:['早班'], thu:['早班'], fri:['早班'], sat:[], sun:[] } },
      { name: 'B組 - 物流', members: ['EMP003'], scheduleType: 'auto', workOnHoliday: true,
        weekdayShifts: { mon:['早班'], tue:['早班'], wed:[], thu:['早班'], fri:[], sat:['午班','晚班'], sun:['午班','晚班'] } },
      { name: 'C組 - 客服', members: ['EMP004', 'EMP005'], scheduleType: 'auto',
        weekdayShifts: { mon:['早班'], tue:['午班','晚班'], wed:['早班'], thu:['午班','晚班'], fri:['早班'], sat:[], sun:[] } }
    ],
    allPositions: ['揀貨員','包裝員','理貨員','搬運工','品檢員','分類員','叉車手','司機'],
    positions: ['理貨員', '包裝員'],
    branches: ['總公司', '北區分店', '中區分店', '南區分店'],
    departments: ['管理部', '營運部', '倉儲部', '物流部', '客服部', '人資部'],
    selectedBranch: '',
    selectedDepartment: '',
    tags: ['可加班', '新人', '夜班優先'],
    schedules: [
      { name: '2026年1月倉儲班表', start: '2026-01-01', end: '2026-01-31' },
      { name: '2026年2月物流班表', start: '2026-02-01', end: '2026-02-28' },
      { name: '2026年3月客服班表', start: '2026-03-01', end: '2026-03-31' }
    ]
  };
  let G = FALLBACK;
  const DATA_VERSION = 13;
  try {
    const raw = localStorage.getItem('shiftMgmt:global');
    if (raw) {
      const stored = JSON.parse(raw);
      G = Object.assign({}, FALLBACK, stored);
      // Always start schedule page with no preselected branch/department filters.
      G.selectedBranch = '';
      G.selectedDepartment = '';
      if ((stored.__version || 0) < DATA_VERSION) {
        G.attendanceGroups = FALLBACK.attendanceGroups;
        G.holidayGroups = FALLBACK.holidayGroups;
        G.shifts = FALLBACK.shifts;
        G.__version = DATA_VERSION;
        try { localStorage.setItem('shiftMgmt:global', JSON.stringify(G)); } catch(e){}
      }
    } else {
      G.__version = DATA_VERSION;
    }
  } catch (e) { console.warn('load global failed', e); }

  // 為了保留原渲染邏輯，將 G 的欄位展開為 module-scope 變數
  let holidayGroups, individualHolidays, shifts, attendanceGroups, positions;
  let holidays = [];
  let persons = G.persons;
  let branches = G.branches || FALLBACK.branches;
  let departments = G.departments || FALLBACK.departments;
  let tags = G.tags;
  let schedules = G.schedules;
  let currentScheduleIndex = 0;

  // 載入指定班表的 per-schedule 設定（fallback 到全域值）
  function _loadScheduleSettings(idx) {
    const s = (G.schedules || [])[idx] || {};
    shifts             = s.shifts             || G.shifts             || FALLBACK.shifts;
    attendanceGroups   = s.attendanceGroups   || G.attendanceGroups   || FALLBACK.attendanceGroups;
    holidayGroups      = s.holidayGroups      || G.holidayGroups      || FALLBACK.holidayGroups;
    individualHolidays = s.individualHolidays != null ? s.individualHolidays : (G.individualHolidays || FALLBACK.individualHolidays);
    positions          = s.positions          || G.positions          || FALLBACK.positions;
    tags               = s.tags               || G.tags               || FALLBACK.tags;
  }
  _loadScheduleSettings(0);
  // 月份覆寫：使用上月/下月/今天時，覆蓋目前班表的時間範圍（不變更 schedules 資料）
  let viewOverride = null; // { start: 'YYYY-MM-DD', end: 'YYYY-MM-DD', name: 'YYYY年M月' }
  // Allow deep-linking from shift-list.html via ?index=N
  try {
    const _qs = new URLSearchParams(location.search);
    const _idx = parseInt(_qs.get('index'), 10);
    if (!Number.isNaN(_idx) && _idx >= 0 && _idx < schedules.length) {
      currentScheduleIndex = _idx;
      _loadScheduleSettings(_idx);
    }
    // 從個人排班頁返回時，依 start/end 覆寫顯示月份
    const _qsStart = _qs.get('start');
    const _qsEnd = _qs.get('end');
    if (_qsStart && _qsEnd) {
      const _d = new Date(_qsStart);
      if (!isNaN(_d.getTime())) {
        const y = _d.getFullYear(), m = _d.getMonth();
        viewOverride = {
          start: _qsStart,
          end: _qsEnd,
          name: `${y}年${m + 1}月排班`
        };
      }
    }
  } catch (e) {}

  let selectedPositions = [];
  let selectedShifts = [];
  let selectedHolidays = [];
  let selectedGroups = [];
  let selectedTags = [];
  let selectedBranchFilter = G.selectedBranch || '';
  let selectedDepartmentFilter = G.selectedDepartment || '';

  // ===== 主題設定 =====
  const defaultConfig = {
    app_title: '派遣排班系統',
    background_color: '#f8fafc',
    header_color: '#1e3a5f',
    text_color: '#1e293b',
    accent_color: '#3b82f6',
    surface_color: '#ffffff',
    font_family: 'Noto Sans TC',
    font_size: 14
  };
  function applyConfig(config) {
    document.getElementById('appTitle').textContent = config.app_title || defaultConfig.app_title;
    document.body.style.fontFamily = `${config.font_family || defaultConfig.font_family}, sans-serif`;
    document.querySelector('header').style.background = config.header_color || defaultConfig.header_color;
    document.getElementById('app').style.background = config.background_color || defaultConfig.background_color;
  }
  applyConfig(defaultConfig);

  // ===== 同步 schedules 到 localStorage =====
  function syncGlobalData() {
    try {
      G.schedules = schedules;
      G.tags = tags;
      G.branches = branches;
      G.departments = departments;
      G.selectedBranch = selectedBranchFilter;
      G.selectedDepartment = selectedDepartmentFilter;
      localStorage.setItem('shiftMgmt:global', JSON.stringify(G));
    } catch(e){}
  }
  window.syncGlobalData = syncGlobalData;

  // ===== 班表切換 =====
  function _fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function getCurrentRange() {
    if (viewOverride) return viewOverride;
    return schedules[currentScheduleIndex] || { name: '', start: '2026-01-01', end: '2026-01-31' };
  }
  function setMonthOverride(year, month /* 0-based */) {
    const start = new Date(year, month, 1);
    const end = new Date(year, month + 1, 0);
    viewOverride = {
      start: _fmtDate(start),
      end: _fmtDate(end),
      name: `${year}年${month + 1}月排班`
    };
  }
  function schedulePrevMonth() {
    const cur = getCurrentRange();
    const d = new Date(cur.start);
    setMonthOverride(d.getFullYear(), d.getMonth() - 1);
    updateSchedulePageTitle();
    renderSchedule();
  }
  function scheduleNextMonth() {
    const cur = getCurrentRange();
    const d = new Date(cur.start);
    setMonthOverride(d.getFullYear(), d.getMonth() + 1);
    updateSchedulePageTitle();
    renderSchedule();
  }
  function scheduleGoToday() {
    const t = new Date();
    setMonthOverride(t.getFullYear(), t.getMonth());
    updateSchedulePageTitle();
    renderSchedule();
  }
  window.schedulePrevMonth = schedulePrevMonth;
  window.scheduleNextMonth = scheduleNextMonth;
  window.scheduleGoToday = scheduleGoToday;

  function updateSchedulePageTitle() {
    const cur = getCurrentRange();
    if (cur) {
      document.getElementById('schedulePageTitle').textContent = cur.name || '';
      document.getElementById('scheduleDateRange').textContent = `${cur.start} ~ ${cur.end}`;
    }
  }
  function toggleScheduleList() {
    const dropdown = document.getElementById('scheduleListDropdown');
    dropdown.classList.toggle('hidden');
    if (!dropdown.classList.contains('hidden')) renderScheduleList();
  }
  function renderScheduleList() {
    document.getElementById('scheduleListContainer').innerHTML = schedules.map((s, i) => `
      <button onclick="switchToSchedule(${i})" class="w-full text-left px-3 py-2 text-sm rounded transition ${i === currentScheduleIndex ? 'bg-blue-100 text-blue-700 font-medium' : 'hover:bg-slate-100 text-slate-700'}">${s.name}</button>
    `).join('');
  }
  function switchToSchedule(i) {
    currentScheduleIndex = i;
    _loadScheduleSettings(i);

  function showNewScheduleModal() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('newScheduleName').value = '';
    document.getElementById('newScheduleStart').value = today;
    document.getElementById('newScheduleEnd').value = today;
    document.getElementById('newScheduleModal').classList.remove('hidden');
  }
  function closeNewScheduleModal() {
    document.getElementById('newScheduleModal').classList.add('hidden');
  }
  function confirmNewSchedule() {
    const name = document.getElementById('newScheduleName').value.trim();
    const start = document.getElementById('newScheduleStart').value;
    const end = document.getElementById('newScheduleEnd').value;
    if (!name) { alert('請輸入班表名稱'); return; }
    if (!start || !end) { alert('請選擇起始和結束日期'); return; }
    if (start > end) { alert('起始日期不能晚於結束日期'); return; }
    schedules.push({ name, start, end });
    currentScheduleIndex = schedules.length - 1;

          <span>${b}</span>

          <input type="radio" name="departmentFilterOption" ${selectedDepartmentFilter === '' ? 'checked' : ''} onclick="selectDepartmentFilter(''); applyScheduleFilters()">
          <span>全部</span>
        </label>

        <label class="flex items-center gap-2 text-sm cursor-pointer px-2 py-1 hover:bg-slate-100 rounded">
          <input type="radio" name="departmentFilterOption" ${selectedDepartmentFilter === d ? 'checked' : ''} onclick="selectDepartmentFilter('${d}'); applyScheduleFilters()">

  function renderSupervisorChips(){
    const c = document.getElementById('supervisorChips');
    if (!c) return;

    if (!list.length) { c.innerHTML = '<span class="text-xs text-slate-400">尚未設定</span>'; return; }
    c.innerHTML = list.map(s => `<span class="chip bg-purple-50 text-purple-700"><i data-lucide="user" class="w-3 h-3"></i>${s}</span>`).join('');

  }
  function togglePositionFilter(v){ const i=selectedPositions.indexOf(v); i>-1?selectedPositions.splice(i,1):selectedPositions.push(v); }
  function toggleShiftFilter(v){ const i=selectedShifts.indexOf(v); i>-1?selectedShifts.splice(i,1):selectedShifts.push(v); }
  function toggleHolidayFilter(v){ const i=selectedHolidays.indexOf(v); i>-1?selectedHolidays.splice(i,1):selectedHolidays.push(v); }
  function toggleGroupFilter(v){ const i=selectedGroups.indexOf(v); i>-1?selectedGroups.splice(i,1):selectedGroups.push(v); }
  function toggleTagFilter(v){ const i=selectedTags.indexOf(v); i>-1?selectedTags.splice(i,1):selectedTags.push(v); }
  function selectBranchFilter(v){ selectedBranchFilter = v; renderScheduleFilters(); }
  function selectDepartmentFilter(v){ selectedDepartmentFilter = v; renderScheduleFilters(); }
  // 假別組為單選：再次點擊可取消，選新的會取代舊的
  function selectHolidayGroupFilter(v){
    const groupKeys = Object.keys(holidayGroups);
    const wasSelected = selectedHolidays.includes(v);
    selectedHolidays = selectedHolidays.filter(x => !groupKeys.includes(x));
    if (!wasSelected) selectedHolidays.push(v);
    renderScheduleFilters();
  }
  // 考勤組為單選：再次點擊可取消，選新的會取代舊的
  function selectGroupFilter(v){
    const wasSelected = selectedGroups.includes(v);
    selectedGroups = wasSelected ? [] : [v];
    renderScheduleFilters();
  }

  function renderActiveFilters() {
    const all = [
      ...selectedPositions.map(p => ({ text: p, type: 'position' })),
      ...selectedShifts.map(s => ({ text: s, type: 'shift' })),
      ...selectedHolidays.map(h => ({ text: h, type: 'holiday' })),
      ...selectedGroups.map(g => ({ text: g, type: 'group' })),
      ...selectedTags.map(t => ({ text: t, type: 'tag' })),
      ...(selectedBranchFilter ? [{ text: selectedBranchFilter, type: 'branch' }] : []),
      ...(selectedDepartmentFilter ? [{ text: selectedDepartmentFilter, type: 'department' }] : [])
    ];
    const af = document.getElementById('activeFilters');
    if (all.length === 0) { af.innerHTML = '<span class="text-xs text-slate-500">尚未選擇</span>'; return; }
    af.innerHTML = all.map(f => `
      <span class="inline-flex items-center gap-2 text-sm bg-blue-50 text-blue-700 px-3 py-1 rounded-full" data-filter-type="${f.type}" data-filter-text="${f.text}">
        ${f.text}
        <button class="text-red-400 hover:text-red-600 remove-filter-btn" type="button">×</button>
      </span>`).join('');
  }

  document.addEventListener('click', (e) => {
    if (e.target.classList.contains('remove-filter-btn')) {
      const span = e.target.closest('[data-filter-type]');
      const type = span.dataset.filterType;
      const text = span.dataset.filterText;
      if (type === 'position') togglePositionFilter(text);
      else if (type === 'shift') toggleShiftFilter(text);
      else if (type === 'holiday') toggleHolidayFilter(text);
      else if (type === 'group') toggleGroupFilter(text);
      else if (type === 'tag') toggleTagFilter(text);
      else if (type === 'branch') selectBranchFilter('');
      else if (type === 'department') selectDepartmentFilter('');
      applyScheduleFilters();
    }
  });

  function applyScheduleFilters() {
    renderActiveFilters();
    renderSchedule();
  }

  function getPersonTag(idx) { return tags[idx % tags.length] || ''; }
  function getPersonBranch(idx) { return branches[idx % branches.length] || ''; }
  function getPersonDepartment(idx) { return departments[idx % departments.length] || ''; }
  function renderScheduleSummary(headCount, totalHours) {
    const el = document.getElementById('scheduleSummary');
    if (!el) return;
    const avg = headCount > 0 ? (totalHours / headCount) : 0;
    const avgText = Number.isInteger(avg) ? `${avg}` : avg.toFixed(1);
    el.innerHTML = `
      <div class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5">
        <div class="text-[11px] text-slate-500">總人數</div>
        <div class="text-base font-semibold text-slate-800">${headCount} 人</div>
      </div>
      <div class="bg-blue-50 border border-blue-100 rounded-lg px-3 py-1.5">
        <div class="text-[11px] text-blue-600">總工時</div>
        <div class="text-base font-semibold text-blue-700">${totalHours} h</div>
      </div>
      <div class="bg-emerald-50 border border-emerald-100 rounded-lg px-3 py-1.5">
        <div class="text-[11px] text-emerald-600">平均工時</div>
        <div class="text-base font-semibold text-emerald-700">${avgText} h</div>
      </div>`;
  }

  function renderSchedule() {
    const cur = getCurrentRange();
    const start = new Date(cur.start);
    const end = new Date(cur.end);
    const days = [];
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) days.push(new Date(d));
    const _today = new Date();
    const _todayStr = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}-${String(_today.getDate()).padStart(2,'0')}`;

    let allHolidaysForDisplay = [];
    if (selectedHolidays.length > 0) {
      selectedHolidays.forEach(item => {
        if (holidayGroups[item]) {
          allHolidaysForDisplay = allHolidaysForDisplay.concat(holidayGroups[item]);
        } else if (/^\d{4}-\d{2}-\d{2}$/.test(item)) {
          if (!allHolidaysForDisplay.includes(item)) allHolidaysForDisplay.push(item);
        }
      });
    } else {
      // 預設顯示：所有假別組 + 彈性假期（與 conflictHolidaySet 對齊）
      const set = new Set(individualHolidays || []);
      Object.values(holidayGroups || {}).forEach(arr => (arr || []).forEach(d => set.add(d)));
      allHolidaysForDisplay = Array.from(set);
    }
    // 假日優先策略：將「目前顯示中」的假別組與彈性假期視為「不可排班」日
    // 若使用者於 UI 勾選了特定假別組/日期，conflictHolidaySet 即僅含該選擇；
    // 未勾選則 fallback 至所有假別組 + individualHolidays，避免漏算
    const conflictHolidaySet = new Set();
    if (selectedHolidays.length > 0) {
      allHolidaysForDisplay.forEach(d => conflictHolidaySet.add(d));
    } else {
      (individualHolidays || []).forEach(d => conflictHolidaySet.add(d));
      Object.values(holidayGroups || {}).forEach(arr => (arr || []).forEach(d => conflictHolidaySet.add(d)));
    }
    const DOW_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
    const shiftHoursMap = {};
    (shifts || []).forEach(s => { shiftHoursMap[s.name] = Number(s.hours) || 0; });
    function getPersonGroup(empId) {
      return (attendanceGroups || []).find(g => Array.isArray(g.members) && g.members.includes(empId));
    }
    // 個人排班資料快取（每次 renderSchedule 重新建立）
    const _pdCache = {};
    function _getPersonalData(eid) {
      if (!(eid in _pdCache)) {
        try { const r = localStorage.getItem(`shiftMgmt:personal:${eid}`); _pdCache[eid] = r ? JSON.parse(r) : null; }
        catch(e) { _pdCache[eid] = null; }
      }
      return _pdCache[eid];
    }
    function isDateInAnySchedule(dateStr) {
      return (schedules || []).some(s => s && s.start && s.end && s.start <= dateStr && dateStr <= s.end);
    }
    function hasPersonalAssignmentOnDate(empId, dateStr) {
      const pd = _getPersonalData(empId);
      return !!(pd && pd.assignments && pd.assignments[dateStr]);
    }
    function getShiftsForPersonOnDate(empId, dateStr, dow) {
      // 優先採用個人排班指派
      const pd = _getPersonalData(empId);
      if (pd && pd.assignments && pd.assignments[dateStr]) {
        const a = pd.assignments[dateStr];
        const isManual = a.source === 'manual';
        if (a.type === 'off') {
          // 紅底休假：個別假日 + 該員工已勾選之假別組；其他（含週末、未勾選假別）→ 個人覆蓋藍底
          const personalHolidaySet = new Set();
          (pd.holidayGroups || []).forEach(grp => {
            ((holidayGroups || {})[grp] || []).forEach(d => personalHolidaySet.add(d));
          });
          (individualHolidays || []).forEach(d => personalHolidaySet.add(d));
          const isSystemHoliday = personalHolidaySet.has(dateStr);
          if (isManual || !isSystemHoliday) {
            return { list: [], isHolidayOt: false, isPersonal: true };
          }
        } else if (a.type === 'work') {
          const names = a.shiftNames || (a.shiftName ? [a.shiftName] : []);
          return { list: names, isHolidayOt: false, isPersonal: true };
        }
      }
      // 僅顯示 schedules 範圍內的系統排班；範圍外若無個人排班，維持空白
      if (!isDateInAnySchedule(dateStr)) return { list: [], isHolidayOt: false };
      // 否則依考勤組自動計算
      const g = getPersonGroup(empId);
      if (!g || (g.scheduleType && g.scheduleType !== 'auto')) return { list: [], isHolidayOt: false };
      const isHoliday = conflictHolidaySet.has(dateStr);
      // 假日優先：默設不排班；除非考勤組勾選「假日仍排班」
      if (isHoliday && !g.workOnHoliday) return { list: [], isHolidayOt: false };
      const ws = g.weekdayShifts || {};
      const arr = ws[DOW_KEYS[dow]];
      const list = Array.isArray(arr) ? arr.filter(n => n) : [];
      return { list, isHolidayOt: isHoliday && list.length > 0 };
    }

    const head = document.getElementById('scheduleHead');
    const weekdays = ['日','一','二','三','四','五','六'];
    // 計算月份分組（固定顯示月份標題列）
    const monthGroups = [];
    days.forEach((d, i) => {
      const label = `${d.getFullYear()}年${d.getMonth()+1}月`;
      if (!monthGroups.length || monthGroups[monthGroups.length-1].label !== label) {
        monthGroups.push({ label, count: 1, firstIdx: i });
      } else {
        monthGroups[monthGroups.length-1].count++;
      }
    });
    // 月份交界日的欄位索引（除第一個月外每月首日）
    const monthBoundarySet = new Set(monthGroups.slice(1).map(mg => mg.firstIdx));
    const monthHeaderRow = `<tr class="bg-slate-200 text-slate-700">
          <th class="sticky left-0 bg-slate-200 z-10 px-3 py-1" colspan="3"></th>
          ${monthGroups.map((mg, idx) => `<th class="py-1 text-xs font-bold text-center ${idx > 0 ? 'border-l-2 border-slate-400' : ''}" colspan="${mg.count}">${mg.label}</th>`).join('')}
        </tr>`;
    head.innerHTML = monthHeaderRow + `<tr class="bg-slate-100">
      <th class="sticky left-0 bg-slate-100 z-10 px-3 py-2 text-left min-w-[140px]">姓名</th>
      <th class="px-2 py-2 min-w-[100px] whitespace-nowrap">考勤組</th>
      <th class="px-2 py-2 min-w-[72px] whitespace-nowrap">總工時</th>
      ${days.map((d, i) => {
        const dateStr = d.toISOString().split('T')[0];
        const isHoliday = allHolidaysForDisplay.includes(dateStr) || d.getDay() === 0 || d.getDay() === 6;
        const isToday = dateStr === _todayStr;
        const boundaryStyle = monthBoundarySet.has(i) ? ' style="border-left:2px solid #94a3b8"' : '';
        return `<th class="calendar-cell ${isHoliday ? 'holiday' : ''}${isToday ? ' today' : ''} text-xs"${boundaryStyle}>${d.getDate()}<br><span class="text-[10px]">${weekdays[d.getDay()]}</span></th>`;
      }).join('')}
    </tr>`;

    const searchQuery = document.getElementById('searchInput').value.toLowerCase();
    const body = document.getElementById('scheduleBody');

    const filteredPersons = persons.filter(p => {
      if (searchQuery && !p.name.toLowerCase().includes(searchQuery) && !p.id.toLowerCase().includes(searchQuery)) return false;
      const idx = persons.indexOf(p);
      const personTag = getPersonTag(idx);
      const personBranch = getPersonBranch(idx);
      const personDepartment = getPersonDepartment(idx);
      const matchesBranch = !selectedBranchFilter || selectedBranchFilter === personBranch;
      const matchesDepartment = !selectedDepartmentFilter || selectedDepartmentFilter === personDepartment;
      if (!matchesBranch || !matchesDepartment) return false;
      if (selectedGroups.length > 0) {
        const grp = getPersonGroup(p.id);
        if (!grp || !selectedGroups.includes(grp.name)) return false;
      }
      if (selectedPositions.length === 0 && selectedTags.length === 0) return true;
      const matchesTag = selectedTags.length === 0 || selectedTags.includes(personTag);
      return matchesTag;
    });

    const personRows = filteredPersons.map(p => {
      let totalHrs = 0;
      const dayShifts = days.map((d, i) => {
        const dateStr = d.toISOString().split('T')[0];
        const hasScheduleData = isDateInAnySchedule(dateStr);
        const hasPersonalData = hasPersonalAssignmentOnDate(p.id, dateStr);
        const canShowDate = hasScheduleData || hasPersonalData;
        const isHolidayDisplay = canShowDate && allHolidaysForDisplay.includes(dateStr);
        const isHolidayActual = conflictHolidaySet.has(dateStr);
        const result = getShiftsForPersonOnDate(p.id, dateStr, d.getDay());
        // 班別篩選：僅保留被勾選之班別（未勾選則全顯示）
        const filteredList = selectedShifts.length === 0 ? result.list : result.list.filter(n => selectedShifts.includes(n));
        filteredList.forEach(n => { totalHrs += shiftHoursMap[n] || 0; });
        return { dateStr, canShowDate, isHolidayDisplay, isHolidayActual, assignedShifts: filteredList, isHolidayOt: result.isHolidayOt && filteredList.length > 0, isPersonal: !!result.isPersonal, isPersonalOff: !!result.isPersonal && result.list.length === 0, isMonthBoundary: monthBoundarySet.has(i) };
      });
      return { p, totalHrs, dayShifts };
    });
    // \u82e5\u6709\u73ed\u5225\u7be9\u9078\uff0c\u96b1\u85cf\u672c\u9031\u5b8c\u5168\u7121\u7b26\u5408\u73ed\u6b21\u4e4b\u4eba\u54e1\n
    const visibleRows = selectedShifts.length === 0
      ? personRows
      : personRows.filter(row => row.dayShifts.some(ds => ds.assignedShifts.length > 0));
    const totalHours = visibleRows.reduce((sum, row) => sum + row.totalHrs, 0);
    renderScheduleSummary(visibleRows.length, totalHours);

    body.innerHTML = visibleRows.map(({ p, totalHrs, dayShifts }) => {
      const grp = getPersonGroup(p.id);
      const groupName = grp ? grp.name : '';
      const groupCell = groupName
        ? `<span class="chip bg-green-50 text-green-700 text-[11px]">${groupName}</span>`
        : '<span class="text-xs text-slate-400">未分組</span>';
      return `<tr class="border-t hover:bg-blue-50/30">
        <td class="sticky left-0 bg-white z-10 px-3 py-2 font-medium text-sm whitespace-nowrap">
          <a href="personal-shift.html?empId=${encodeURIComponent(p.id)}&scheduleIndex=${currentScheduleIndex}${viewOverride ? `&start=${viewOverride.start}&end=${viewOverride.end}` : ''}" onclick="syncGlobalData()" class="text-blue-700 hover:text-blue-900 hover:underline cursor-pointer">${p.name}</a>
          <div class="text-xs text-slate-500">${p.id}</div>
        </td>
        <td class="px-2 py-2 text-center text-xs whitespace-nowrap">${groupCell}</td>
        <td class="px-2 py-2 text-center text-xs font-medium text-blue-700">${totalHrs}h</td>
        ${dayShifts.map(ds => {
          if (!ds.canShowDate) {
            const boundaryStyle = ds.isMonthBoundary ? ' style="border-left:2px solid #94a3b8"' : '';
            return `<td class="calendar-cell text-xs cursor-pointer"${boundaryStyle} onclick="syncGlobalData();window.location.href='personal-shift.html?empId=${encodeURIComponent(p.id)}&scheduleIndex=${currentScheduleIndex}${viewOverride ? `&start=${viewOverride.start}&end=${viewOverride.end}` : ''}'"></td>`;
          }
          const hasShift = ds.assignedShifts.length > 0;
          const shiftLabel = hasShift
            ? ds.assignedShifts.map(n => {
                const sh = (shifts || []).find(s => s.name === n);
                return sh && sh.shortName ? sh.shortName : n;
              }).join('/')
            : '';
          let label, cls;
          if (ds.isHolidayOt) {
            label = shiftLabel;
            cls = 'holiday-ot';
          } else if (ds.isPersonal && hasShift) {
            // 個人指派工作班別 → 優先顯示班別（即使該日是假日）
            label = shiftLabel;
            cls = 'assigned';
          } else if (ds.isPersonalOff) {
            label = '休';
            cls = 'holiday';
          } else if (ds.isHolidayDisplay) {
            label = '休';
            cls = 'holiday';
          } else if (hasShift) {
            label = shiftLabel;
            cls = 'assigned';
          } else {
            label = '';
            cls = '';
          }
          const personalCls = ds.isPersonal ? ' personal' : '';
          const boundaryStyle = ds.isMonthBoundary ? ' style="border-left:2px solid #94a3b8"' : '';
          const title = ds.isHolidayOt ? `假日加班：${ds.assignedShifts.join('、')}` : (ds.isPersonal ? '個人指派（點擊編輯）' : '');
          return `<td class="calendar-cell ${cls}${personalCls} text-xs cursor-pointer"${boundaryStyle} title="${title}" onclick="syncGlobalData();window.location.href='personal-shift.html?empId=${encodeURIComponent(p.id)}&scheduleIndex=${currentScheduleIndex}${viewOverride ? `&start=${viewOverride.start}&end=${viewOverride.end}` : ''}'">${label}</td>`;
        }).join('')}
      </tr>`;
    }).join('');
  }

  // ===== 初始化 =====
  updateSchedulePageTitle();
  renderScheduleFilters();
  renderSchedule();
  syncGlobalData();
  lucide.createIcons();

  // 從個人排班返回（bfcache 恢復）時重新讀取個人排班資料
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) renderSchedule();
  });

  // 點擊外部關閉篩選 dropdown
  document.addEventListener('click', (e) => {
    if (!e.target.closest('[id$="Filter"]') && !e.target.closest('button[onclick*="toggleFilterDropdown"]')) {
      ['positionFilter','shiftFilter','holidayFilter','groupFilter','tagFilter','branchFilter','departmentFilter'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add('hidden');
      });
    }
    if (!e.target.closest('#scheduleListDropdown') && !e.target.closest('button[onclick*="toggleScheduleList"]')) {
      const sd = document.getElementById('scheduleListDropdown');
      if (sd) sd.classList.add('hidden');
    }
  });
